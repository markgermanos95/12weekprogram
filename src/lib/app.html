<!DOCTYPE html>
<html lang="en">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Coaching</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5F4F0; --card:#FFFFFF; --ink:#17181C; --faint:#94928A;
    --line:#E4E2DB; --line-strong:#CFCCC3;
    --ramp:#5B7B8C; --work:#17181C; --max:#C8442B;
    --grotesk:'Space Grotesk',-apple-system,system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--paper);font-family:var(--grotesk);color:var(--ink);line-height:1.4;-webkit-font-smoothing:antialiased}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  .app{max-width:440px;margin:0 auto;min-height:100vh;background:var(--paper);padding-bottom:48px}

  .hd{position:sticky;top:0;z-index:30;background:var(--paper);border-bottom:1px solid var(--line);padding:14px 18px 10px}
  .hd-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .client{font-size:19px;font-weight:600;letter-spacing:-.01em;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .cdrop{color:var(--line-strong);font-size:13px}
  .client .meta,.meta{font-size:12px;color:var(--faint);font-weight:500;margin-top:2px}
  .hd-tools{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .edit-btn{appearance:none;border:1px solid var(--line-strong);background:transparent;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--faint);padding:6px 10px;border-radius:7px;cursor:pointer}
  .edit-btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .phase-switch{display:flex;border:1px solid var(--line-strong);border-radius:7px;overflow:hidden}
  .phase-switch button{appearance:none;border:0;background:transparent;font-family:var(--mono);font-size:11px;font-weight:500;color:var(--faint);padding:6px 9px;cursor:pointer}
  .phase-switch button.on{background:var(--ink);color:#fff}
  .trow{display:flex;gap:8px;align-items:center}
  .phasetag{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--faint);border:1px solid var(--line-strong);padding:6px 10px;border-radius:7px}
  .iconbtn{appearance:none;width:30px;height:30px;border:1px solid var(--line-strong);background:transparent;border-radius:7px;color:var(--faint);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .iconbtn svg{width:15px;height:15px}
  .iconbtn:hover{color:var(--ink);border-color:var(--ink)}
  .link{color:var(--ink);font-weight:600;cursor:pointer;white-space:nowrap}
  .savestat{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;height:11px;margin-top:7px}
  .phase-label{font-size:12px;color:var(--faint);padding:8px 18px 0}
  .phase-label b{color:var(--ink);font-weight:600}

  .back{display:flex;align-items:center;gap:6px;background:transparent;border:0;font-family:var(--grotesk);font-size:13px;font-weight:500;color:var(--faint);cursor:pointer;padding:0;margin-bottom:10px}
  .back svg{width:14px;height:14px}
  .wrap{padding:14px 18px}
  .note{font-size:13px;color:var(--faint);margin:2px 0 18px;line-height:1.5}
  .note b{color:var(--ink);font-weight:600}

  .resume{background:var(--ink);color:#fff;border-radius:12px;padding:13px 15px;margin-bottom:16px;display:flex;align-items:center;gap:12px;cursor:pointer}
  .resume-t{font-size:14px;font-weight:600}
  .resume-s{font-family:var(--mono);font-size:11px;color:#b8b6b0;margin-top:2px}
  .resume .chev{color:#6e6f74}

  .group-lbl{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;margin:22px 0 9px;display:flex;align-items:center;gap:8px}
  .group-lbl:first-of-type{margin-top:4px}
  .group-lbl .ln{flex:1;height:1px;background:var(--line)}

  .scard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px 13px;margin-bottom:10px;display:flex;gap:13px;align-items:stretch;transition:border-color .15s,transform .1s}
  .scard.tap{cursor:pointer}
  .scard.tap:active{transform:scale(.992)}
  .scard.tap:hover{border-color:var(--line-strong)}
  .rail{width:4px;border-radius:3px;flex-shrink:0;background:var(--ink)}
  .rail.p2{opacity:.45}
  .rail.p3{background:var(--line-strong)}
  .rail.p4{background:var(--line-strong);opacity:.5}
  .scard-body{flex:1;min-width:0}
  .linkbtn{appearance:none;width:30px;height:30px;flex-shrink:0;border:1px solid var(--line-strong);background:transparent;border-radius:7px;color:var(--faint);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-right:6px}
  .linkbtn svg{width:15px;height:15px}
  .linkbtn:hover{color:var(--ink);border-color:var(--ink)}
  .scard-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .ptag{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.05em;padding:2px 6px;border-radius:5px;border:0}
  .ptag.p1{background:var(--ink);color:#fff}
  .ptag.p2{background:#E9E7E0;color:var(--ink)}
  .ptag.p3{background:transparent;color:var(--faint);border:1px solid var(--line-strong)}
  .ptag.p4{background:transparent;color:var(--faint);border:1px dashed var(--line-strong)}
  .ptag.btn{cursor:pointer}
  .scard-name{font-size:16px;font-weight:600;letter-spacing:-.01em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .scard-sub{font-family:var(--mono);font-size:11px;color:var(--faint);display:flex;gap:10px;flex-wrap:wrap}
  .scard-sub .dot{color:var(--line-strong)}
  .chev{align-self:center;color:var(--line-strong);flex-shrink:0}
  .chev svg{width:16px;height:16px;display:block}

  .ec{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .arrows{display:flex;flex-direction:column;gap:2px}
  .abtn,.del,.posbtn{appearance:none;border:1px solid var(--line-strong);background:var(--card);border-radius:6px;cursor:pointer;color:var(--faint);display:flex;align-items:center;justify-content:center}
  .abtn{width:26px;height:20px}.abtn svg{width:12px;height:12px}
  .abtn:disabled{opacity:.3;cursor:default}
  .del{width:28px;height:28px}.del svg{width:13px;height:13px}
  .del:hover{color:var(--max);border-color:var(--max)}
  .tinput{font-family:var(--grotesk);font-weight:600;font-size:15px;color:var(--ink);border:1px solid var(--line);border-radius:7px;background:var(--paper);padding:6px 8px;width:100%}
  .tinput:focus{outline:none;border-color:var(--ink);background:#fff}

  .sess-head{display:flex;align-items:center;gap:9px;margin-bottom:3px}
  .sess-name{font-size:22px;font-weight:700;letter-spacing:-.02em;flex:1}
  .sess-meta{font-family:var(--mono);font-size:11px;color:var(--faint);margin-bottom:18px}
  .legend{display:flex;gap:14px;margin-bottom:16px;padding:9px 12px;background:var(--card);border:1px solid var(--line);border-radius:9px}
  .legend span{font-size:11px;color:var(--faint);display:flex;align-items:center;gap:5px;font-weight:500}
  .lg-b{font-family:var(--mono);font-size:10px;font-weight:700;width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff}

  .block{margin-bottom:14px}
  .block.ss{position:relative;padding-left:16px}
  .ss-rail{position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--ink);border-radius:3px}
  .ss-tag{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--ink);margin:0 0 7px;display:flex;align-items:center;gap:6px}
  .ss-tag .cnt{color:var(--faint)}
  .block-edit{display:flex;align-items:center;gap:7px;margin-bottom:7px}

  .ex{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 13px;margin-bottom:8px}
  .ex:last-child{margin-bottom:0}
  .ex-top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .ex-key{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--faint);flex-shrink:0}
  .ex-name{font-size:15px;font-weight:600;letter-spacing:-.01em;flex:1}
  .ex-name-input{margin-bottom:6px;font-weight:600}
  .ex-field{margin-bottom:6px;font-size:13px;font-weight:400}
  .ex-cues{resize:vertical;min-height:60px;font-size:13px}
  .ex-yt{display:inline-block;font-size:12px;font-weight:600;color:var(--max);text-decoration:none;margin-bottom:6px}
  .ex-cues-disp{font-size:13px;color:var(--faint);margin-bottom:8px;white-space:pre-wrap;line-height:1.5}
  .histbtn{appearance:none;border:1px solid var(--line);background:var(--paper);border-radius:7px;width:30px;height:28px;cursor:pointer;color:var(--faint);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .histbtn svg{width:15px;height:15px}
  .histbtn:hover{color:var(--ink);border-color:var(--line-strong)}

  .srow.head{padding:0 2px 5px}
  .srow.head .col{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--faint);text-transform:uppercase}
  .srow{display:grid;grid-template-columns:34px 1fr 56px 62px 30px;gap:7px;align-items:center;padding:5px 2px}
  .srow.edit{grid-template-columns:34px 1fr 30px}
  .col-tgt{font-family:var(--mono);font-size:12px;color:var(--faint)}
  .srow.done .col-tgt{opacity:.4}
  .badge{font-family:var(--mono);font-size:11px;font-weight:700;height:30px;border-radius:7px;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff}
  .badge.sm{height:20px;width:20px;font-size:10px;cursor:default}
  .badge.R{background:var(--ramp)} .badge.W{background:var(--work)} .badge.M{background:var(--max)}
  .inp{font-family:var(--mono);font-size:14px;font-weight:500;text-align:center;height:34px;width:100%;border:1px solid var(--line);border-radius:7px;background:var(--paper);color:var(--ink);padding:0 4px}
  .inp.tgt{text-align:left}
  .inp:focus{outline:none;border-color:var(--ink);background:#fff}
  .inp::placeholder{color:var(--line-strong);font-weight:400}
  .chk{height:30px;width:30px;border:1px solid var(--line-strong);border-radius:7px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:transparent;padding:0}
  .chk svg{width:15px;height:15px}
  .srow.done .chk{background:var(--ink);border-color:var(--ink);color:#fff}
  .srow.done .inp{opacity:.55}
  .ex-add{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--faint);background:transparent;border:0;cursor:pointer;padding:6px 6px 0 2px;display:inline-flex;align-items:center;gap:5px}
  .ex-add:hover{color:var(--ink)}
  .cue{font-family:var(--mono);font-size:10px;color:var(--faint);padding:1px 2px 7px 41px;line-height:1.4;letter-spacing:.01em}
  .cue.up{color:var(--ramp);font-weight:700}
  .cue.m{color:var(--max);font-weight:700}
  .wload{display:flex;align-items:center;gap:9px;margin:0 0 10px;padding:8px 10px;background:var(--paper);border:1px solid var(--line);border-radius:9px}
  .wload-l{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);flex:1}
  .wload-i{width:84px;height:32px}
  .maxbuild{padding:2px 2px 9px 41px;display:flex;flex-direction:column;gap:6px}
  .max-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .msel{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--ink);border:1px solid var(--line-strong);border-radius:7px;background:var(--card);padding:6px 8px;cursor:pointer}
  .msel:focus{outline:none;border-color:var(--ink)}
  .mfld{height:32px;width:96px}
  .inp.mfld{font-size:13px}
  .max-prev{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--max);letter-spacing:.01em}
  .max-rep{appearance:none;display:inline-flex;align-items:center;gap:6px;align-self:flex-start;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--faint);background:transparent;border:1px solid var(--line-strong);border-radius:7px;padding:5px 9px;cursor:pointer;letter-spacing:.02em}
  .max-rep svg{width:12px;height:12px}
  .max-rep:hover{color:var(--ink);border-color:var(--ink)}
  .cardio-cals{display:flex;align-items:center;gap:9px;margin-top:11px;padding-top:11px;border-top:1px solid #2b2c31}
  .cc-l{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9d9c97;flex:1}
  .cc-i{font-family:var(--mono);font-size:14px;font-weight:500;text-align:center;height:32px;width:84px;border:1px solid #3a3b40;border-radius:7px;background:#2b2c31;color:#fff;padding:0 6px}
  .cc-i:focus{outline:none;border-color:#fff}
  .cc-i::placeholder{color:#6e6f74}
  .cc-u{font-family:var(--mono);font-size:11px;color:#9d9c97}
  .chist{appearance:none;width:26px;height:26px;border:1px solid #3a3b40;background:transparent;border-radius:7px;color:#9d9c97;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .chist svg{width:14px;height:14px}
  .chist:hover{color:#fff;border-color:#fff}
  .hnote{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--max);padding:1px 0 4px 28px}
  .hwl{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--faint);text-transform:none;letter-spacing:0;margin-left:8px}
  .chrow{display:flex;align-items:center;gap:12px}
  .chcal{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--ink)}
  .chstage{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .cwhen{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--ramp);margin-left:8px}

  .cardio{background:var(--ink);color:#fff;border-radius:12px;padding:14px 15px;margin:0 0 14px}
  .cardio.bottom{margin:18px 0 0}
  .cardio-hd{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
  .cardio-ic{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.13em;color:#9d9c97}
  .fixed-pill{font-family:var(--mono);font-size:10px;font-weight:700;background:#2b2c31;color:#cfcdc7;padding:3px 7px;border-radius:5px;letter-spacing:.04em}
  .ladder{display:flex;gap:4px;margin-bottom:9px}
  .seg{flex:1;height:6px;border-radius:3px;background:#3a3b40}
  .seg.chosen{background:#fff;box-shadow:0 0 0 2px var(--ramp)}
  .cardio-stage{font-size:15px;font-weight:600;margin-bottom:1px}
  .cardio-detail{font-family:var(--mono);font-size:11px;color:#b8b6b0}
  .cardio-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:11px}
  input[type=range]{width:100%;accent-color:#fff;height:24px;margin:2px 0}
  .lead-note{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--ramp)}
  .cardio .chk{border-color:#4a4b50;flex-shrink:0}
  .cardio.done .chk{background:#fff;border-color:#fff;color:var(--ink)}
  .cardio.done .cardio-stage{opacity:.5}
  .cardio-pos{display:flex;gap:6px;margin-bottom:10px}
  .posbtn{font-family:var(--mono);font-size:10px;font-weight:700;color:#b8b6b0;background:#2b2c31;border-color:#3a3b40;padding:5px 8px;letter-spacing:.04em}
  .posbtn.on{background:#fff;color:var(--ink);border-color:#fff}

  .addbar{display:flex;gap:8px;margin-top:14px}
  .addbtn{flex:1;font-family:var(--grotesk);font-size:13px;font-weight:500;color:var(--faint);background:transparent;border:1px dashed var(--line-strong);border-radius:10px;padding:11px;cursor:pointer}
  .addbtn:hover{color:var(--ink);border-color:var(--ink)}
  .finish{width:100%;font-family:var(--grotesk);font-size:15px;font-weight:600;color:#fff;background:var(--ink);border:0;border-radius:11px;padding:14px;cursor:pointer;margin-top:22px}
  .finish:active{transform:scale(.995)}
  .foot{text-align:center;font-family:var(--mono);font-size:10px;color:var(--line-strong);margin-top:18px;letter-spacing:.04em}

  /* overlays */
  .overlay{position:fixed;inset:0;background:rgba(20,20,22,.42);z-index:60;display:flex;align-items:flex-end;justify-content:center}
  .sheet{background:var(--paper);width:100%;max-width:440px;border-radius:18px 18px 0 0;padding:18px 18px 28px;max-height:82vh;overflow-y:auto}
  .sheet-h{font-size:17px;font-weight:700;letter-spacing:-.01em;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
  .x{appearance:none;border:0;background:transparent;color:var(--faint);cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
  .x svg{width:18px;height:18px}
  .cli{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
  .cli.on{border-color:var(--ink)}
  .cli-n{font-size:15px;font-weight:600}
  .cli-g{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:2px}
  .hist-list{display:flex;flex-direction:column;gap:12px}
  .hist-entry{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
  .hist-d{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
  .hsrow{display:flex;align-items:center;gap:10px;padding:3px 0}
  .htgt{font-family:var(--mono);font-size:11px;color:var(--faint);width:54px}
  .hval{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--ink)}
  .hval .hx{color:var(--line-strong)}
  .hist-empty{font-family:var(--mono);font-size:12px;color:var(--faint);padding:8px 2px}
  .info-sec{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
  .info-sec:first-child{margin-top:4px}
  .info-sec .ln{flex:1;height:1px;background:var(--line)}
  .info-item{margin-bottom:13px;font-size:13.5px;line-height:1.5;color:var(--faint)}
  .info-item .it-h{color:var(--ink);font-weight:600;display:block;margin-bottom:1px}
  .info-key{display:flex;gap:11px;margin-bottom:13px;align-items:flex-start}
  .info-key .kx{flex:1;font-size:13.5px;line-height:1.45;color:var(--faint)}
  .info-key .kx b{color:var(--ink);font-weight:600}
  .mfield{width:100%;font-family:var(--grotesk);font-size:16px;border:1px solid var(--line-strong);border-radius:9px;padding:11px 12px;background:#fff}
  .mfield:focus{outline:none;border-color:var(--ink)}
  .mrow{display:flex;gap:9px;margin-top:14px}
  .mbtn{flex:1;font-family:var(--grotesk);font-size:14px;font-weight:600;border-radius:9px;padding:12px;cursor:pointer;border:1px solid var(--line-strong);background:var(--card);color:var(--ink)}
  .mbtn.go{background:var(--ink);color:#fff;border-color:var(--ink)}
  .mbtn.danger{background:var(--max);color:#fff;border-color:var(--max)}

  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:12px;color:var(--faint);font-family:var(--mono);font-size:12px;letter-spacing:.08em}
  .login-wrap{display:flex;align-items:center;justify-content:center;height:90vh;padding:20px}
  .login-card{width:100%;max-width:320px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px}
  .login-t{font-weight:600;font-size:16px;margin-bottom:14px}
  .login-err{color:var(--max);font-size:13px;margin-top:8px}
  .spin{width:22px;height:22px;border:2px solid var(--line);border-top-color:var(--ink);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

/* ============================================================
   DATA LAYER — coach calls go through /api/coach/ (cookie-gated,
   set by logging in). Client calls go through /api/client/ (no
   login — a long random token in the URL is the access key).
   ============================================================ */
const USE_REAL = true;

/* Client gating: ?client=TOKEN serves one client in locked client-mode.
   This is a long unguessable token, not the client's row ID. */
const CLIENT_TOKEN_FROM_URL = new URLSearchParams(location.search).get('client') || '';
const CLIENT_MODE = !!CLIENT_TOKEN_FROM_URL;

// Function args where the first argument is currently a clientId need that
// swapped for the token server-side expects; args where the first argument
// is a logId need the token prepended instead. Keeps every existing call
// site in this file unchanged — only gs() itself needs to know this.
const CLIENT_REPLACE_FIRST = new Set(['getTemplate','startSession','getOpenSession','getExerciseHistory','getLastSession','getCardioHistory']);
const CLIENT_PREPEND = new Set(['saveProgress','finishSession','getLog']);

class LoginRequired extends Error {}

async function gs(method){
  const args = Array.prototype.slice.call(arguments, 1);
  let path, body;
  if (CLIENT_MODE){
    path = '/api/client/' + method;
    if (CLIENT_REPLACE_FIRST.has(method)) args[0] = CLIENT_TOKEN_FROM_URL;
    else if (CLIENT_PREPEND.has(method)) args.unshift(CLIENT_TOKEN_FROM_URL);
    body = args;
  } else {
    path = '/api/coach/' + method;
    body = args;
  }
  const r = await fetch(path, {
    method: 'POST', headers: {'content-type':'application/json'},
    body: JSON.stringify({ args: body })
  });
  if (r.status === 401){
    if (!CLIENT_MODE) throw new LoginRequired();
    throw new Error('This link is no longer valid.');
  }
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

const TEMPLATE_KEYS = ['tpl_beginner','tpl_intermediate','tpl_advanced'];

const MOCK = (function(){
  const today = () => new Date().toISOString().slice(0,10);
  let clients = [];
  const clone = o => JSON.parse(JSON.stringify(o));
  let templates = {};
  TEMPLATE_KEYS.forEach(k => { const s=buildSeed(); templates[k+'|1']=s[1]; templates[k+'|2']=s[2]; });
  let sLogs = [], setLogs = []; let n = 0; const id = () => 'L' + (++n);
  let cn = 0; const cid_ = () => 'c'+(++cn);
  return {
    getClients: () => clone(clients),
    addClient: (name, goal) => { const cid=cid_(); clients.push({clientId:cid,name:name||'New client',goal:goal||'',currentPhase:1}); templates[cid+'|1']=[]; templates[cid+'|2']=[]; return cid; },
    addClientFromTemplate: (name, goal, key) => { const cid=cid_(); clients.push({clientId:cid,name:name||'New client',goal:goal||'',currentPhase:1}); templates[cid+'|1']=clone(templates[key+'|1']||[]); templates[cid+'|2']=clone(templates[key+'|2']||[]); return cid; },
    setCurrentPhase: (cid, ph) => { const c=clients.find(x=>x.clientId===cid); if(c)c.currentPhase=Number(ph); return true; },
    getTemplate: (cid, ph) => ({ clientId:cid, phase:Number(ph), sessions: clone(templates[cid+'|'+ph] || []) }),
    saveTemplate: (cid, ph, sessions) => { templates[cid+'|'+ph]=clone(sessions); return true; },
    startSession: (cid, ph, sid, sname) => {
      const open = sLogs.find(l => l.clientId===cid && l.sessionId===sid && l.status==='open');
      if (open) return MOCK.getLog(open.logId);
      const logId=id(); sLogs.push({logId,clientId:cid,phase:Number(ph),sessionId:sid,sessionName:sname,date:today(),cardioStage:'',cardioDone:false,status:'open'});
      return {logId,clientId:cid,phase:Number(ph),sessionId:sid,sessionName:sname,status:'open',cardioStage:'',cardioDone:false,sets:[]};
    },
    saveProgress: (logId, p) => { const l=sLogs.find(x=>x.logId===logId); if(l){l.cardioStage=p.cardioStage;l.cardioDone=p.cardioDone;} setLogs=setLogs.filter(s=>s.logId!==logId); (p.sets||[]).forEach(s=>setLogs.push(Object.assign({logId},s))); return true; },
    getOpenSession: (cid) => { const o=sLogs.filter(l=>l.clientId===cid&&l.status==='open').slice(-1)[0]; return o?MOCK.getLog(o.logId):null; },
    finishSession: (logId) => { const l=sLogs.find(x=>x.logId===logId); if(l){l.status='done';l.date=today();} return true; },
    getLog: (logId) => { const l=sLogs.find(x=>x.logId===logId); if(!l)return null; return Object.assign(clone(l),{sets:clone(setLogs.filter(s=>s.logId===logId))}); },
    getExerciseHistory: (cid, exId) => {
      const done={}; sLogs.forEach(l=>{if(l.clientId===cid&&l.status==='done')done[l.logId]={date:l.date,sessionName:l.sessionName};});
      const byLog={}; setLogs.forEach(s=>{if(s.exId===exId&&done[s.logId])(byLog[s.logId]=byLog[s.logId]||[]).push(s);});
      return Object.keys(byLog).map(lg=>({logId:lg,date:done[lg].date,sessionName:done[lg].sessionName,sets:clone(byLog[lg]).sort((a,b)=>a.setOrder-b.setOrder)})).sort((a,b)=>a.date<b.date?1:-1);
    }
  };
})();

function curSession(){ return S.template ? S.template.sessions.find(s => s.sessionId === S.sessionId) : null; }
function exAt(bi, ei){ const s = curSession(); return s.blocks[bi].items[ei]; }
function move(arr, i, dir){ const j=i+dir; if(j<0||j>=arr.length) return; const t=arr[i]; arr[i]=arr[j]; arr[j]=t; }

/* Double progression cue. Working sets: hold weight, add reps inside the
   range; once the top of the range is hit, the cue flips to "add weight".
   Max sets are handled separately by the max-set builder below. */
function parseRange(t){ const m=String(t==null?'':t).match(/(\d+)\s*[–-]\s*(\d+)/); return m?{lo:+m[1],hi:+m[2]}:null; }
function lastSet(exId,si){ const m=(S.last&&S.last.sets)||{}; return m[exId+':'+si]||null; }
// Working load carries forward across sessions: ghost-prefill from the most
// recent logged workingLoad for this exercise (any set), editable, no enforcement.
function lastWorkLoad(exId){
  const m=(S.last&&S.last.sets)||{};
  for(const k in m){ if(k.indexOf(exId+':')===0 && m[k].workingLoad) return m[k].workingLoad; }
  return '';
}
function workLoad(exId){ const e=S.exEntries[exId]; return (e&&e.workLoad!=null)?e.workLoad : ''; }
function setWorkLoad(exId,val){ (S.exEntries[exId]||(S.exEntries[exId]={})).workLoad=val; scheduleProgressSave(); }

/* Max-set builder. Stores a small structured blob per max set; composeMax()
   turns it into the human string shown as next session's cue. */
const MAX_METHODS=[
  ['','How\'d you push it?'],['+reps','+ reps'],['rest-pause','rest-pause'],['dropset','dropset'],
  ['partials','partials'],['slow','slow eccentric'],['forced','forced reps'],['cluster','cluster'],
  ['failure','near failure / failure'],['other','other']
];
function composeMax(mx){
  if(!mx||!mx.method) return '';
  switch(mx.method){
    case '+reps': return mx.reps?('+'+mx.reps+' reps'):'+reps';
    case 'rest-pause': return mx.bursts?('rest-pause '+mx.bursts):'rest-pause';
    case 'dropset': { const a=mx.dload?(mx.dload):''; const b=mx.dreps?('×'+mx.dreps):''; const t=[a,b].filter(Boolean).join(' '); return t?('dropset '+t):'dropset'; }
    case 'partials': return 'partials'+(mx.pos?(' ('+mx.pos+')'):'');
    case 'slow': return mx.secs?(mx.secs+'s eccentric'):'slow eccentric';
    case 'forced': return mx.n?('+'+mx.n+' forced'):'forced reps';
    case 'cluster': return mx.detail?('cluster '+mx.detail):'cluster';
    case 'failure': return mx.fail==='near'?(mx.left?('~'+mx.left+' left'):'near failure'):'to failure';
    case 'other': return mx.text||'';
  }
  return '';
}
function maxOf(exId,si){ const en=S.runEntries[exId+':'+si]; return (en&&en.max)?en.max:null; }
function setMaxMethod(bi,ei,si,method){ const e=exAt(bi,ei); const k=e.exId+':'+si; const en=S.runEntries[k]||(S.runEntries[k]={}); en.max={method}; scheduleProgressSave(); render(); }
function setMaxField(bi,ei,si,fld,val){ const e=exAt(bi,ei); const k=e.exId+':'+si; const en=S.runEntries[k]||(S.runEntries[k]={}); (en.max||(en.max={method:''}))[fld]=val; scheduleProgressSave(); }
function setMaxFieldR(bi,ei,si,fld,val){ setMaxField(bi,ei,si,fld,val); render(); }
function repeatMax(bi,ei,si){ const e=exAt(bi,ei); const prev=lastSet(e.exId,si); if(!prev||!prev.maxNote) return; let blob=null; try{ blob=JSON.parse(prev.maxNote); }catch(_){ blob=null; } if(!blob) return; const k=e.exId+':'+si; const en=S.runEntries[k]||(S.runEntries[k]={}); en.max=blob; scheduleProgressSave(); render(); }
function lastMaxDisplay(exId,si){ const prev=lastSet(exId,si); if(!prev||!prev.maxNote) return ''; try{ const b=JSON.parse(prev.maxNote); return composeMax(b); }catch(_){ return ''; } }
function progCueMain(exId,si,st,type){
  if(type!=='W') return null;
  const prev=lastSet(exId,si);
  const range=parseRange(st.target);
  if(!range){ return (prev&&(prev.reps||prev.load))?{t:'Last: '+(prev.reps||'–')+' × '+(prev.load||'–'),c:''}:null; }
  if(!prev||(!prev.reps&&!prev.load)) return {t:'Work in '+range.lo+'–'+range.hi, c:''};
  const r=parseInt(prev.reps,10);
  if(!isNaN(r)&&r>=range.hi) return {t:'↑ Add weight — hit '+r+' @ '+(prev.load||'?'), c:'up'};
  if(!isNaN(r)) return {t:'Beat '+r+' @ '+(prev.load||'?')+' · same weight', c:''};
  return {t:'Last @ '+(prev.load||'?')+' — add a rep', c:''};
}
function progCue(exId,si,st,type){
  if(type==='R'||type==='M') return null;
  return progCueMain(exId,si,st,type);
}

let _pTimer=null, _tTimer=null;
function setStat(t){ const el=document.getElementById('savestat'); if(el) el.textContent=t; }
function scheduleProgressSave(){
  if(!S.log) return; setStat('saving…'); clearTimeout(_pTimer);
  _pTimer=setTimeout(()=>{ gs('saveProgress', S.log.logId, buildLogPayload()).then(()=>setStat('saved')).catch(()=>setStat('save failed')); }, 900);
}
function scheduleTemplateSave(){
  setStat('saving…'); clearTimeout(_tTimer);
  _tTimer=setTimeout(()=>{ gs('saveTemplate', S.clientId, S.phase, S.template.sessions).then(()=>setStat('saved')).catch(()=>setStat('save failed')); }, 900);
}
function flushTemplateSave(){ if(_tTimer){ clearTimeout(_tTimer); _tTimer=null; gs('saveTemplate', S.clientId, S.phase, S.template.sessions); } }
function buildLogPayload(){
  const s=curSession(); const sets=[];
  s.blocks.forEach(b=>b.items.forEach(e=>e.sets.forEach((st,si)=>{
    const en=S.runEntries[e.exId+':'+si]||{};
    const type=en.type||st.type;
    const wl=workLoad(e.exId);
    const maxNote=(type==='M' && en.max && en.max.method)?JSON.stringify(en.max):'';
    sets.push({ exId:e.exId, exName:e.name, setOrder:si, setType:type, target:st.target, reps:en.reps||'', load:en.load||'', done:!!en.done, workingLoad:wl, maxNote });
  })));
  return { clientId:S.clientId, phase:S.phase, sessionId:s.sessionId, sessionName:s.name, cardioStage:S.cardio.stage, cardioDone:S.cardio.done, cardioCals:S.cardio.cals||'', cardioWhen:(s.cardioPos&&s.cardioPos!=='none')?s.cardioPos:'', sets };
}

async function boot(){
  S.loading=true; render();
  try{
    if(CLIENT_MODE){
      const c = await gs('resolveClientToken', CLIENT_TOKEN_FROM_URL);
      if(!c){ S.loading=false; app.innerHTML=`<div class="loading">PROGRAM NOT FOUND<br><span style="color:var(--line-strong)">Check your link</span></div>`; return; }
      S.clients=[c]; S.clientId=c.clientId; S.client=c; S.phase=Number(c.currentPhase)||1; S.edit=false; S.isTemplate=false;
      await loadTemplate();
      S.open = await gs('getOpenSession', S.clientId);
      S.loading=false; S.view='week'; render(); return;
    }
    S.clients = await gs('getClients');
    S.loading=false; S.view='home'; render();
  }catch(e){
    if (e instanceof LoginRequired){ S.loading=false; S.view='login'; render(); return; }
    setStat('load failed'); S.loading=false; render();
  }
}
async function doLogin(password){
  try{
    const r = await fetch('/api/login', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ password }) });
    if(!r.ok){ S.loginError='Wrong password'; render(); return; }
    S.loginError=''; await boot();
  }catch(e){ S.loginError='Something went wrong — try again'; render(); }
}
async function loadTemplate(){ S.template = await gs('getTemplate', S.clientId, S.phase); }

function openInfo(){ S.infoOpen=true; render(); }
function closeInfo(){ S.infoOpen=false; render(); }
async function copyClientLink(i){
  const c=S.clients[i]; if(!c||!c.accessToken){ setStat('no link yet — reload'); return; }
  const url = location.origin + '/?client=' + c.accessToken;
  try{ await navigator.clipboard.writeText(url); setStat('link copied'); }

async function doLogout(){
  try{ await fetch('/api/logout', { method:'POST' }); }catch(e){}
  location.reload();
}

async function switchPhase(ph){ if(CLIENT_MODE) return; ph=Number(ph); if(ph===S.phase) return; flushTemplateSave(); S.phase=ph; if(!S.isTemplate){ try{ await gs('setCurrentPhase',S.clientId,ph); }catch(e){} } await loadTemplate(); render(); }
function toggleEdit(){ if(CLIENT_MODE||S.isTemplate) return; if(S.edit) flushTemplateSave(); S.edit=!S.edit; render(); }

async function openSession(i){
  const s=S.template.sessions[i]; if(!s) return;
  S.sessionId=s.sessionId; S.view='session'; S.last=null;
  if(S.isTemplate){ S.log=null; S.runEntries={}; S.exEntries={}; S.cardio={stage:1,done:false,cals:''}; render(); window.scrollTo(0,0); return; }
  try{
    const log=await gs('startSession', S.clientId, S.phase, s.sessionId, s.name); S.log=log; hydrate(log);
    try{ S.last=await gs('getLastSession', S.clientId, s.sessionId); }catch(e){ S.last=null; }
  }
  catch(e){ S.log=null; S.runEntries={}; S.exEntries={}; S.cardio={stage:1,done:false,cals:''}; S.last=null; }
  render(); window.scrollTo(0,0);
}
function hydrate(log){
  S.runEntries={}; S.exEntries={};
  (log.sets||[]).forEach(s=>{
    const en={type:s.setType,reps:s.reps,load:s.load,done:s.done};
    if(s.maxNote){ try{ en.max=JSON.parse(s.maxNote); }catch(_){ } }
    S.runEntries[s.exId+':'+s.setOrder]=en;
    if(s.workingLoad && S.exEntries[s.exId]===undefined) S.exEntries[s.exId]={workLoad:s.workingLoad};
  });
  S.cardio={ stage:Number(log.cardioStage)||1, done:!!log.cardioDone, cals:log.cardioCals||'' };
}
async function backToWeek(){ S.view='week'; S.sessionId=null; if(!S.isTemplate){ try{ S.open=await gs('getOpenSession',S.clientId); }catch(e){ S.open=null; } } render(); window.scrollTo(0,0); }
async function resumeOpen(){
  if(!S.open) return;
  if(Number(S.open.phase)!==S.phase){ S.phase=Number(S.open.phase); await loadTemplate(); }
  const i=S.template.sessions.findIndex(s=>s.sessionId===S.open.sessionId);
  if(i>=0) await openSession(i);
}
async function finishCurrent(){
  if(!S.log) return; clearTimeout(_pTimer);
  setStat('saving…');
  try{ await gs('saveProgress',S.log.logId,buildLogPayload()); await gs('finishSession',S.log.logId); }catch(e){}
  S.log=null; S.runEntries={};
  await backToWeek();
}

/* ---- run interactions ---- */
function cycleBadge(bi,ei,si){
  const e=exAt(bi,ei);
  if(S.edit){ const st=e.sets[si]; st.type=CYCLE[(CYCLE.indexOf(st.type)+1)%3]; scheduleTemplateSave(); }
  else{ const k=e.exId+':'+si; const en=S.runEntries[k]||(S.runEntries[k]={}); const cur=en.type||e.sets[si].type; en.type=CYCLE[(CYCLE.indexOf(cur)+1)%3]; scheduleProgressSave(); }
  render();
}
function setCell(bi,ei,si,fld,val){ const e=exAt(bi,ei); const k=e.exId+':'+si; const en=S.runEntries[k]||(S.runEntries[k]={}); en[fld]=val; scheduleProgressSave(); }
function toggleDone(bi,ei,si){ const e=exAt(bi,ei); const k=e.exId+':'+si; const en=S.runEntries[k]||(S.runEntries[k]={}); en.done=!en.done; scheduleProgressSave(); render(); }
function slideCardio(val){
  S.cardio.stage=Number(val); const st=LADDER[S.cardio.stage-1];
  const cs=document.getElementById('cstage'); if(cs) cs.textContent='Stage '+S.cardio.stage+' · '+st.n;
  const cd=document.getElementById('cdetail'); if(cd) cd.textContent=st.d;
  for(let i=1;i<=LADDER.length;i++){ const sg=document.getElementById('cseg-'+i); if(sg) sg.classList.toggle('chosen', i===S.cardio.stage); }
  scheduleProgressSave();
}
function toggleCardioDone(){ S.cardio.done=!S.cardio.done; scheduleProgressSave(); render(); }
function setCardioCals(val){ S.cardio.cals=val; scheduleProgressSave(); }

/* ---- template (edit) interactions ---- */
function renameSession(i,val){ S.template.sessions[i].name=val; scheduleTemplateSave(); }
function renameCur(val){ curSession().name=val; scheduleTemplateSave(); }
function moveSession(i,dir){ move(S.template.sessions,i,dir); scheduleTemplateSave(); render(); }
function cyclePriority(i){ const s=S.template.sessions[i]; s.priority=s.priority%4+1; scheduleTemplateSave(); render(); }
async function delSession(i){ if(!(await modalConfirm('Delete this session?','Delete'))) return; S.template.sessions.splice(i,1); scheduleTemplateSave(); render(); }
function addSession(){ S.template.sessions.push({sessionId:uid(),name:'New session',priority:1,cardioPos:'none',blocks:[]}); scheduleTemplateSave(); render(); }
function renameEx(bi,ei,val){ exAt(bi,ei).name=val; scheduleTemplateSave(); }
function editTarget(bi,ei,si,val){ exAt(bi,ei).sets[si].target=val; scheduleTemplateSave(); }
function editExField(bi,ei,field,val){ const e=exAt(bi,ei); e[field]=val; scheduleTemplateSave(); }
function delEx(bi,ei){ const s=curSession(); s.blocks[bi].items.splice(ei,1); if(!s.blocks[bi].items.length) s.blocks.splice(bi,1); scheduleTemplateSave(); render(); }
function moveBlock(bi,dir){ move(curSession().blocks,bi,dir); scheduleTemplateSave(); render(); }
async function delBlock(bi){ if(!(await modalConfirm('Remove this block?','Remove'))) return; curSession().blocks.splice(bi,1); scheduleTemplateSave(); render(); }
function delSet(bi,ei,si){ exAt(bi,ei).sets.splice(si,1); scheduleTemplateSave(); render(); }
function addSet(bi,ei){ const e=exAt(bi,ei); const last=e.sets[e.sets.length-1]; e.sets.push({type:'W',target:last?last.target:'10–12'}); scheduleTemplateSave(); render(); }
async function addBlock(kind){
  const name=await modalInput('Exercise name','e.g. Back Squat'); if(!name) return;
  const ex={exId:uid(),name,sets:[{type:'W',target:'10–12'},{type:'W',target:'10–12'},{type:'W',target:'10–12'}]};
  if(kind==='single' && S.template.sessions.length) curSession().blocks.push({kind:'single',items:[ex]});
  else curSession().blocks.push({kind:kind,items:[ex]});
  scheduleTemplateSave(); render();
}
async function addToSS(bi){ const name=await modalInput('Exercise name','add to superset'); if(!name) return; curSession().blocks[bi].items.push({exId:uid(),name,sets:[{type:'W',target:'10–12'},{type:'W',target:'10–12'},{type:'W',target:'10–12'}]}); scheduleTemplateSave(); render(); }
function cardioPos(pos){ curSession().cardioPos=pos; scheduleTemplateSave(); render(); }
function addCardioBlock(){ curSession().cardioPos='bottom'; scheduleTemplateSave(); render(); }
function delCardio(){ curSession().cardioPos='none'; scheduleTemplateSave(); render(); }

  const info=`<button class="iconbtn" onclick="openInfo()" title="How it works">${ICON_INFO}</button>`;

  if(CLIENT_MODE){
    return `<div class="hd"><div class="hd-top">
      <div><div class="client" style="cursor:default">${esc(S.client.name)}</div><div class="meta">${esc(S.client.goal||'')}</div></div>

    </div><div class="savestat" id="savestat"></div>`;
  }
  if(S.isTemplate){
    return `<div class="hd"><div class="hd-top">
      <div><div class="client" style="cursor:default">${esc(S.client.name)}</div><div class="meta">${esc(S.client.goal||'')}</div></div>

    </div><div class="savestat" id="savestat"></div>`;

}

function homeHTML(){
  const info=`<button class="iconbtn" onclick="openInfo()" title="How it works">${ICON_INFO}</button>`;
  const logout=`<button class="iconbtn" onclick="doLogout()" title="Log out">${ICON_LOGOUT}</button>`;
  let h=`<div class="hd"><div class="hd-top">
    <div><div class="client" style="cursor:default">Coaching</div><div class="meta">${S.clients.length} client${S.clients.length===1?'':'s'}</div></div>
    <div class="hd-tools"><div class="trow">${info}${logout}</div></div>
  </div><div class="savestat" id="savestat"></div></div><div class="wrap">`;
  h+=`<div class="group-lbl">Templates<span class="ln"></span></div>`;
  TEMPLATES.forEach((t,i)=>{
    h+=`<div class="scard tap" onclick="openTemplate(${i})"><div class="rail"></div><div class="scard-body">
      <div class="scard-top"><span class="scard-name">${esc(t.label)}</span></div>
      <div class="scard-sub"><span>starter program · edit to taste</span></div></div><div class="chev">${ICON_CHEV}</div></div>`;
  });

  if(!S.clients.length) h+=`<div class="hist-empty">No clients yet — create one from a template.</div>`;
  S.clients.forEach((c,i)=>{
    h+=`<div class="scard tap" onclick="openClientHome(${i})"><div class="rail"></div><div class="scard-body">
      <div class="scard-top"><span class="scard-name">${esc(c.name)}</span></div>
      <div class="scard-sub"><span>${esc(c.goal||'')||'—'}</span><span class="dot">·</span><span>Phase ${c.currentPhase||1}</span></div></div>

function weekHTML(){
  const p=S.template;
  const phLabel=S.phase===1?'Higher rep':'Medium rep'; const phWk=S.phase===1?'Weeks 1–6':'Weeks 7–12';
  let h=hdOpen()+`</div><div class="phase-label">Phase ${S.phase} · <b>${phLabel}</b> · ${phWk}</div><div class="wrap">`;
  if(!CLIENT_MODE) h+=`<button class="back" onclick="goHome()">${ICON_BACK} Home</button>`;
  if(S.open && !S.edit) h+=`<div class="resume" onclick="resumeOpen()"><div style="flex:1"><div class="resume-t">Resume in-progress session</div><div class="resume-s">${esc(S.open.sessionName)} · pick up where you left off</div></div><div class="chev">${ICON_CHEV}</div></div>`;
  h+=`<div class="note">Sessions are ordered by priority — that's also the drop order. Start at the top and work down; the lower tiers are optional when time and energy allow. <span class="link" onclick="openInfo()">How it works ›</span></div>`;
  if(S.edit){
    h+=`<div class="group-lbl">Reorder · rename · re-tag<span class="ln"></span></div>`;
    p.sessions.forEach((s,i)=> h+=editTile(s,i,p.sessions.length));
    h+=`<div class="addbar"><button class="addbtn" onclick="addSession()">+ add session</button></div>`;
  } else {
    [[1,'Priority 1 · each session · 1–2× per week'],[2,'Priority 2 · optional'],[3,'Priority 3 · optional'],[4,'Priority 4 · optional']].forEach(g=>{
      const list=[]; p.sessions.forEach((s,i)=>{ if(s.priority===g[0]) list.push([s,i]); });
      if(!list.length) return;
      h+=`<div class="group-lbl">${g[1]}<span class="ln"></span></div>`;
      list.forEach(pair=> h+=runTile(pair[0],pair[1]));
    });
    if(!p.sessions.length) h+=`<div class="hist-empty">No sessions yet. Tap EDIT to build the program.</div>`;
  }
  h+=`<div class="foot">${USE_REAL?'SYNCED TO SHEETS':'PREVIEW · IN-MEMORY (deploy for live sync)'}</div></div>`;
  return h;
}
function runTile(s,i){
  const cardio = s.cardioPos && s.cardioPos!=='none';
  return `<div class="scard tap" onclick="openSession(${i})">
    <div class="rail p${s.priority}"></div>
    <div class="scard-body">
      <div class="scard-top"><span class="ptag p${s.priority}">P${s.priority}</span><span class="scard-name">${esc(s.name)}</span></div>
      <div class="scard-sub"><span>${countEx(s)} exercises</span><span class="dot">·</span><span>${countSets(s)} sets</span>${cardio?`<span class="dot">·</span><span>cardio ${esc(s.cardioPos)}</span>`:''}</div>
    </div><div class="chev">${ICON_CHEV}</div></div>`;
}
function editTile(s,i,n){
  return `<div class="scard">
    <div class="ec"><div class="arrows">
      <button class="abtn" onclick="moveSession(${i},-1)" ${i===0?'disabled':''}>${ICON_UP}</button>
      <button class="abtn" onclick="moveSession(${i},1)" ${i===n-1?'disabled':''}>${ICON_DN}</button></div></div>
    <div class="scard-body"><div class="scard-top">
      <button class="ptag btn p${s.priority}" onclick="cyclePriority(${i})">P${s.priority}</button>
      <input class="tinput" value="${escA(s.name)}" oninput="renameSession(${i},this.value)"></div></div>
    <div class="ec">
      <button class="abtn" onclick="openSession(${i})" title="Edit exercises">${ICON_CHEV}</button>
      <button class="del" onclick="delSession(${i})">${ICON_X}</button></div></div>`;
}
function countSets(s){ let n=0; s.blocks.forEach(b=>b.items.forEach(e=>n+=e.sets.length)); return n; }
function countEx(s){ let n=0; s.blocks.forEach(b=>n+=b.items.length); return n; }

function sessionHTML(){
  const s=curSession(); if(!s){ S.view='week'; return weekHTML(); }
  let h=hdOpen()+`</div><div class="wrap"><button class="back" onclick="backToWeek()">${ICON_BACK} Week</button>`;
  if(S.edit) h+=`<div class="sess-head"><span class="ptag p${s.priority}">P${s.priority}</span><input class="tinput" value="${escA(s.name)}" oninput="renameCur(this.value)"></div>`;
  else h+=`<div class="sess-head"><span class="ptag p${s.priority}">P${s.priority}</span><span class="sess-name">${esc(s.name)}</span></div>`;
  h+=`<div class="sess-meta">Phase ${S.phase} · ${S.phase===1?'higher rep':'medium rep'}</div>
    <div class="legend"><span><span class="lg-b badge R">R</span> Ramp-up</span><span><span class="lg-b badge W">W</span> Working</span><span><span class="lg-b badge M">M</span> Max</span></div>`;
  if(s.cardioPos==='top') h+=cardioHTML(s,'top');
  s.blocks.forEach((b,bi)=>{
    if(b.kind==='superset'){
      h+=`<div class="block ss"><div class="ss-rail"></div>`;
      if(S.edit) h+=blockEditBar(bi,s.blocks.length,'superset'); else h+=`<div class="ss-tag">SUPERSET <span class="cnt">${b.items.length} exercises · alternate</span></div>`;
      b.items.forEach((e,ei)=> h+=exHTML(s,bi,ei));
      if(S.edit) h+=`<button class="ex-add" onclick="addToSS(${bi})">+ add to superset</button>`;
      h+=`</div>`;
    } else {
      h+=`<div class="block">`; if(S.edit) h+=blockEditBar(bi,s.blocks.length,'single'); h+=exHTML(s,bi,0)+`</div>`;
    }
  });
  if(s.cardioPos==='bottom') h+=cardioHTML(s,'bottom');
  if(S.edit){
    h+=`<div class="addbar"><button class="addbtn" onclick="addBlock('single')">+ exercise</button><button class="addbtn" onclick="addBlock('superset')">+ superset</button></div>`;
    if(s.cardioPos==='none') h+=`<div class="addbar"><button class="addbtn" onclick="addCardioBlock()">+ cardio block</button></div>`;
  } else {
    h+=`<button class="finish" onclick="finishCurrent()">Finish session</button><div class="foot">Autosaving — close and come back any time.</div>`;
  }
  return h+`</div>`;
}
function blockEditBar(bi,n,kind){
  return `<div class="block-edit"><div class="arrows">
    <button class="abtn" onclick="moveBlock(${bi},-1)" ${bi===0?'disabled':''}>${ICON_UP}</button>
    <button class="abtn" onclick="moveBlock(${bi},1)" ${bi===n-1?'disabled':''}>${ICON_DN}</button></div>
    <span class="ss-tag" style="margin:0">${kind==='superset'?'SUPERSET':'EXERCISE'}</span>
    <button class="del" onclick="delBlock(${bi})" style="margin-left:auto">${ICON_X}</button></div>`;
}
function exHTML(session,bi,ei){
  const blk=session.blocks[bi]; const e=blk.items[ei];
  const key=blk.kind==='superset'?(KEYS[bi]+(ei+1)):null;
  let rows='';
  if(S.edit){
    rows+=`<input class="tinput ex-name-input" value="${escA(e.name)}" placeholder="Exercise name" oninput="renameEx(${bi},${ei},this.value)">`;
    rows+=`<input class="tinput ex-field" value="${escA(e.youtube||'')}" placeholder="YouTube URL (optional)" oninput="editExField(${bi},${ei},'youtube',this.value)">`;
    rows+=`<textarea class="tinput ex-field ex-cues" placeholder="Cues / notes (optional)" oninput="editExField(${bi},${ei},'cues',this.value)">${esc(e.cues||'')}</textarea>`;
    rows+=`<div class="srow head edit"><div class="col"></div><div class="col">Target</div><div class="col"></div></div>`;
    e.sets.forEach((st,si)=> rows+=`<div class="srow edit"><button class="badge ${st.type}" onclick="cycleBadge(${bi},${ei},${si})">${st.type}</button><input class="inp tgt" value="${escA(st.target)}" placeholder="target" oninput="editTarget(${bi},${ei},${si},this.value)"><button class="del" onclick="delSet(${bi},${ei},${si})">${ICON_X}</button></div>`);
    rows+=`<button class="ex-add" onclick="addSet(${bi},${ei})">+ set</button>`;
  } else {
    if(e.youtube) rows+=`<a class="ex-yt" href="${escA(e.youtube)}" target="_blank" rel="noopener">▶ Watch demo</a>`;
    if(e.cues) rows+=`<div class="ex-cues-disp">${esc(e.cues)}</div>`;
    const hasW=e.sets.some((st,si)=>((S.runEntries[e.exId+':'+si]||{}).type||st.type)==='W');
    if(hasW){ const wl=workLoad(e.exId); const phw=lastWorkLoad(e.exId)||'–'; rows+=`<div class="wload"><span class="wload-l">Working load</span><input class="inp wload-i" inputmode="decimal" placeholder="${escA(phw)}" value="${escA(wl)}" oninput="setWorkLoad('${e.exId}',this.value)"></div>`; }
    rows+=`<div class="srow head"><div class="col"></div><div class="col">Target</div><div class="col" style="text-align:center">Reps</div><div class="col" style="text-align:center">Load</div><div class="col"></div></div>`;
    e.sets.forEach((st,si)=>{
      const en=S.runEntries[e.exId+':'+si]||{}; const type=en.type||st.type;
      const reps=en.reps!=null?en.reps:''; const load=en.load!=null?en.load:''; const done=!!en.done;
      const prev=lastSet(e.exId,si);
      const phR=(prev&&prev.reps)?escA(prev.reps):'–'; const phL=(prev&&prev.load)?escA(prev.load):'–';
      rows+=`<div class="srow ${done?'done':''}"><button class="badge ${type}" onclick="cycleBadge(${bi},${ei},${si})">${type}</button><div class="col-tgt">${esc(st.target)}</div><input class="inp" inputmode="numeric" placeholder="${phR}" value="${escA(reps)}" oninput="setCell(${bi},${ei},${si},'reps',this.value)"><input class="inp" inputmode="decimal" placeholder="${phL}" value="${escA(load)}" oninput="setCell(${bi},${ei},${si},'load',this.value)"><button class="chk" onclick="toggleDone(${bi},${ei},${si})">${ICON_CHK}</button></div>`;
      if(type==='M') rows+=maxBuild(bi,ei,si,e);
      else { const cue=progCue(e.exId,si,st,type); if(cue) rows+=`<div class="cue ${cue.c}">${esc(cue.t)}</div>`; }
    });
    rows+=`<button class="ex-add" onclick="addSet(${bi},${ei})">+ set</button>`;
  }
  const nameCell=S.edit?'':`<span class="ex-name">${esc(e.name)}</span>`;
  const hist=!S.edit?`<button class="histbtn" onclick="openHistory(${bi},${ei})" title="History">${ICON_HIST}</button>`:'';
  const delBtn=S.edit?`<button class="del" onclick="delEx(${bi},${ei})">${ICON_X}</button>`:'';
  return `<div class="ex"><div class="ex-top">${key?`<span class="ex-key">${key}</span>`:''}${nameCell}${hist}${delBtn}</div>${rows}</div>`;
}
function numFieldMax(bi,ei,si,fld,ph,val){ return `<input class="inp mfld" inputmode="decimal" placeholder="${escA(ph)}" value="${escA(val==null?'':val)}" oninput="setMaxField(${bi},${ei},${si},'${fld}',this.value)">`; }
function txtFieldMax(bi,ei,si,fld,ph,val){ return `<input class="inp mfld wide" placeholder="${escA(ph)}" value="${escA(val==null?'':val)}" oninput="setMaxField(${bi},${ei},${si},'${fld}',this.value)">`; }
function selFieldMax(bi,ei,si,fld,opts,val){ let o=''; opts.forEach(v=>{ o+=`<option value="${escA(v)}" ${v===val?'selected':''}>${esc(v||'choose…')}</option>`; }); return `<select class="msel mfld" onchange="setMaxFieldR(${bi},${ei},${si},'${fld}',this.value)">${o}</select>`; }
function maxBuild(bi,ei,si,e){
  const mx=maxOf(e.exId,si)||{method:''}; const m=mx.method||'';
  let opts=''; MAX_METHODS.forEach(o=>{ opts+=`<option value="${escA(o[0])}" ${o[0]===m?'selected':''}>${esc(o[1])}</option>`; });
  let fields='';
  if(m==='+reps') fields=numFieldMax(bi,ei,si,'reps','extra reps',mx.reps);
  else if(m==='rest-pause') fields=txtFieldMax(bi,ei,si,'bursts','e.g. 8 +3 +2',mx.bursts);
  else if(m==='dropset') fields=numFieldMax(bi,ei,si,'dload','drop load',mx.dload)+numFieldMax(bi,ei,si,'dreps','drop reps',mx.dreps);
  else if(m==='partials') fields=selFieldMax(bi,ei,si,'pos',['','long','middle','short'],mx.pos);
  else if(m==='slow') fields=numFieldMax(bi,ei,si,'secs','seconds',mx.secs);
  else if(m==='forced') fields=numFieldMax(bi,ei,si,'n','forced reps',mx.n);
  else if(m==='cluster') fields=txtFieldMax(bi,ei,si,'detail','detail (optional)',mx.detail);
  else if(m==='failure') fields=selFieldMax(bi,ei,si,'fail',['','failure','near'],mx.fail)+(mx.fail==='near'?numFieldMax(bi,ei,si,'left','reps left',mx.left):'');
  else if(m==='other') fields=txtFieldMax(bi,ei,si,'text','what you did',mx.text);
  const disp=composeMax(mx); const preview=disp?`<div class="max-prev">${esc(disp)}</div>`:'';
  const lastD=lastMaxDisplay(e.exId,si);
  const repeat=lastD?`<button class="max-rep" onclick="repeatMax(${bi},${ei},${si})">${ICON_REPEAT}<span>last: ${esc(lastD)}</span></button>`:'';
  return `<div class="maxbuild"><div class="max-row"><select class="msel" onchange="setMaxMethod(${bi},${ei},${si},this.value)">${opts}</select>${fields}</div>${preview}${repeat}</div>`;
}
function cardioHTML(session,pos){
  const stage=S.cardio.stage||1; const done=S.cardio.done; const st=LADDER[stage-1];
  let segs=''; for(let i=1;i<=LADDER.length;i++) segs+=`<div class="seg${i===stage?' chosen':''}" id="cseg-${i}"></div>`;
  let editControls='', ctrl='', foot='', cals='', histbtn='';
  if(S.edit){
    editControls=`<div class="cardio-pos">
      <button class="posbtn ${session.cardioPos==='top'?'on':''}" onclick="cardioPos('top')">FIRST</button>
      <button class="posbtn ${session.cardioPos==='bottom'?'on':''}" onclick="cardioPos('bottom')">LAST</button>
      <button class="posbtn" onclick="delCardio()" style="margin-left:auto">REMOVE</button></div>`;
  } else {
    ctrl=`<input type="range" min="1" max="${LADDER.length}" value="${stage}" oninput="slideCardio(this.value)">`;
    cals=`<div class="cardio-cals"><span class="cc-l">Total output</span><input class="cc-i" inputmode="numeric" placeholder="–" value="${escA(S.cardio.cals||'')}" oninput="setCardioCals(this.value)"><span class="cc-u">cals</span></div>`;
    foot=`<div class="cardio-foot"><span class="lead-note">${pos==='top'?'DO THIS FIRST':'FINISH WITH THIS'}</span><button class="chk" onclick="toggleCardioDone()">${ICON_CHK}</button></div>`;
    histbtn=`<button class="chist" onclick="openCardioHistory()" title="Cardio history">${ICON_HIST}</button>`;
  }
  return `<div class="cardio ${pos} ${done?'done':''}">
    <div class="cardio-hd"><span class="cardio-ic">CARDIO · PICK WHAT YOU DID</span><span style="display:flex;align-items:center;gap:8px"><span class="fixed-pill">20 MIN · FIXED</span>${histbtn}</span></div>
    ${editControls}<div class="ladder">${segs}</div>${ctrl}
    <div class="cardio-stage" id="cstage">Stage ${stage} · ${esc(st.n)}</div>
    <div class="cardio-detail" id="cdetail">${esc(st.d)}</div>${cals}${foot}</div>`;
}

function clientsOverlay(){
  let items=''; S.clients.forEach((c,i)=>{ items+=`<button class="cli ${c.clientId===S.clientId?'on':''}" onclick="pickClient(${i})"><div class="cli-n">${esc(c.name)}</div><div class="cli-g">${esc(c.goal||'')}</div></button>`; });
  return `<div class="overlay" onclick="closeClients()"><div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-h">Clients <button class="x" onclick="closeClients()">${ICON_X}</button></div>${items}
    <button class="addbtn" onclick="newClient()">+ add client</button></div></div>`;
}
function historyOverlay(){
  const H=S.history; let body='';
  if(H.data===null) body=`<div class="hist-empty">Loading…</div>`;
  else if(!H.data.length) body=`<div class="hist-empty">No history yet for this exercise.</div>`;
  else H.data.forEach(en=>{
    let sets='';
    en.sets.forEach(st=>{
      let note='';
      if(st.type==='M' && st.maxNote){ try{ const d=composeMax(JSON.parse(st.maxNote)); if(d) note=`<div class="hnote">${esc(d)}</div>`; }catch(_){ } }
      sets+=`<div class="hsrow"><span class="badge sm ${st.type}">${st.type}</span><span class="htgt">${esc(st.target)}</span><span class="hval">${esc(st.reps||'–')} <span class="hx">×</span> ${esc(st.load||'–')}</span></div>${note}`;
    });
    const wl=(en.sets.find(x=>x.workingLoad)||{}).workingLoad;
    const wlTag=wl?`<span class="hwl">working ${esc(wl)}</span>`:'';
    body+=`<div class="hist-entry"><div class="hist-d">${esc(en.date)} · ${esc(en.sessionName)}${wlTag}</div>${sets}</div>`;
  });
  return `<div class="overlay" onclick="closeHistory()"><div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-h">${esc(H.name)} <button class="x" onclick="closeHistory()">${ICON_X}</button></div>
    <div class="hist-list">${body}</div></div></div>`;
}
function cardioHistoryOverlay(){
  const H=S.cardioHist; let body='';
  if(H.data===null) body=`<div class="hist-empty">Loading…</div>`;
  else if(!H.data.length) body=`<div class="hist-empty">No cardio logged yet.</div>`;
  else H.data.forEach(en=>{
    const when=en.when==='top'?'START':(en.when==='bottom'?'END':'');
    const tag=when?`<span class="cwhen">${when}</span>`:'';
    const stg=en.stage?('Stage '+en.stage):'';
    const cals=en.cals?(esc(en.cals)+' cals'):'–';
    body+=`<div class="hist-entry"><div class="hist-d">${esc(en.date)}${tag}</div>
      <div class="chrow"><span class="chcal">${cals}</span><span class="chstage">${esc(stg)}</span></div></div>`;
  });
  return `<div class="overlay" onclick="closeCardioHistory()"><div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-h">Cardio history <button class="x" onclick="closeCardioHistory()">${ICON_X}</button></div>
    <div class="hist-list">${body}</div></div></div>`;
}
function modalOverlay(){
  const m=S.modal;
  if(m.kind==='choice'){
    let opts=''; (m.options||[]).forEach((o,i)=>{ opts+=`<button class="cli" onclick="modalPick(${i})"><div class="cli-n">${esc(o.label)}</div></button>`; });
    return `<div class="overlay" onclick="modalCancel()"><div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-h">${esc(m.title)}</div>${opts}
      <div class="mrow"><button class="mbtn" onclick="modalCancel()">Cancel</button></div></div></div>`;
  }
  const field=m.kind==='input'?`<input class="mfield" id="modalfield" placeholder="${escA(m.placeholder)}" value="">`:'';
  const goCls=m.kind==='confirm'?'mbtn danger':'mbtn go';
  const goTxt=m.kind==='confirm'?m.go:'Save';
  return `<div class="overlay" onclick="modalCancel()"><div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-h">${esc(m.title)}</div>${field}
    <div class="mrow"><button class="mbtn" onclick="modalCancel()">Cancel</button><button class="${goCls}" onclick="modalSubmit()">${esc(goTxt)}</button></div></div></div>`;
}
function infoOverlay(){
  const key=(t,name,desc)=>`<div class="info-key"><span class="badge sm ${t}">${t}</span><div class="kx"><b>${name}</b> — ${desc}</div></div>`;
  return `<div class="overlay" onclick="closeInfo()"><div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-h">How it works <button class="x" onclick="closeInfo()">${ICON_X}</button></div>
    <div class="info-sec">Weekly effort<span class="ln"></span></div>
    <div class="info-item"><span class="it-h">Going hard</span>Hit each Priority 1 session 3× this week. Add Priority 2–4 on top if you've got the gas.</div>
    <div class="info-item"><span class="it-h">Solid work</span>Hit each Priority 1 twice, plus a Priority 2/3/4 session or two when time allows.</div>
    <div class="info-item"><span class="it-h">Minimum effective</span>Hit each Priority 1 once. That's the floor that keeps you progressing — anything above is a bonus.</div>
    <div class="info-sec">Set types<span class="ln"></span></div>
    ${key('R','Ramp-up','light, building toward your working weight. Stay well short of failure (~5+ reps in reserve). Primes the movement, not a hard set.')}
    ${key('W','Working','your main effort. Hard but controlled — leave about 1–3 reps in reserve.')}
    ${key('M','Max effort','the set that drives the adaptation. Take it to or within a rep of failure (~0–1 in reserve).')}
    <div class="info-item" style="margin-top:4px">Tap a set's badge to cycle R → W → M.</div>
  </div></div>`;
}

function loginHTML(){
  return `<div class="login-wrap">
    <div class="login-card">
      <div class="login-t">Coach login</div>
      <input class="mfield" id="loginfield" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')submitLogin()">
      ${S.loginError ? `<div class="login-err">${esc(S.loginError)}</div>` : ''}
      <button class="mbtn go" style="width:100%;margin-top:10px" onclick="submitLogin()">Log in</button>
    </div>
  </div>`;
}
function submitLogin(){
  const f=document.getElementById('loginfield');
  doLogin(f ? f.value : '');
}

function render(){
  if(S.loading){ app.innerHTML=`<div class="loading"><div class="spin"></div>LOADING</div>`; return; }
  let h;
  if(S.view==='login') h=loginHTML();
  else if(S.view==='home') h=homeHTML();
  else if(S.view==='session') h=sessionHTML();
  else h=weekHTML();
  if(S.clientsOpen) h+=clientsOverlay();
  if(S.history && S.history.open) h+=historyOverlay();
  if(S.cardioHist && S.cardioHist.open) h+=cardioHistoryOverlay();
  if(S.infoOpen) h+=infoOverlay();
  if(S.modal) h+=modalOverlay();
  app.innerHTML=h;
  if(S.modal && S.modal.kind==='input'){ const f=document.getElementById('modalfield'); if(f) f.focus(); }
  if(S.view==='login'){ const f=document.getElementById('loginfield'); if(f) f.focus(); }
}

boot();
</script>
</body>
</html>
