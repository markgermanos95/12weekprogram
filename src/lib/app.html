<!DOCTYPE html>
<html lang="en">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>12 Week Programs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5F4F0; --card:#FFFFFF; --ink:#17181C; --faint:#94928A;
    --line:#E4E2DB; --line-strong:#CFCCC3;
    --ramp:#5B7B8C; --work:#17181C; --max:#C8442B;
    --grotesk:'Space Grotesk',-apple-system,system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--paper);font-family:var(--grotesk);color:var(--ink);line-height:1.4;-webkit-font-smoothing:antialiased}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  .app{max-width:440px;margin:0 auto;min-height:100vh;background:var(--paper);padding-bottom:48px}

  .hd{position:sticky;top:0;z-index:30;background:var(--paper);border-bottom:1px solid var(--line);padding:14px 18px 10px}
  .hd-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .client{font-size:19px;font-weight:600;letter-spacing:-.01em;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .cdrop{color:var(--line-strong);font-size:13px}
  .client .meta,.meta{font-size:12px;color:var(--faint);font-weight:500;margin-top:2px}
  .hd-tools{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .edit-btn{appearance:none;border:1px solid var(--line-strong);background:transparent;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--faint);padding:6px 10px;border-radius:7px;cursor:pointer}
  .edit-btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .phase-switch{display:flex;border:1px solid var(--line-strong);border-radius:7px;overflow:hidden}
  .phase-switch button{appearance:none;border:0;background:transparent;font-family:var(--mono);font-size:11px;font-weight:500;color:var(--faint);padding:6px 9px;cursor:pointer}
  .phase-switch button.on{background:var(--ink);color:#fff}
  .trow{display:flex;gap:8px;align-items:center}
  .phasetag{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--faint);border:1px solid var(--line-strong);padding:6px 10px;border-radius:7px}
  .iconbtn{appearance:none;width:30px;height:30px;border:1px solid var(--line-strong);background:transparent;border-radius:7px;color:var(--faint);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .iconbtn svg{width:15px;height:15px}
  .iconbtn:hover{color:var(--ink);border-color:var(--ink)}
  .link{color:var(--ink);font-weight:600;cursor:pointer;white-space:nowrap}
  .savestat{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;height:11px;margin-top:7px}
  .phase-label{font-size:12px;color:var(--faint);padding:8px 18px 0}
  .phase-label b{color:var(--ink);font-weight:600}

  .back{display:flex;align-items:center;gap:6px;background:transparent;border:0;font-family:var(--grotesk);font-size:13px;font-weight:500;color:var(--faint);cursor:pointer;padding:0;margin-bottom:10px}
  .back svg{width:14px;height:14px}
  .logbtn{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:9px;font-family:var(--grotesk);font-size:13px;font-weight:500;color:var(--faint);cursor:pointer;padding:9px 13px;margin-bottom:16px}
  .logbtn svg{width:15px;height:15px}
  .logbtn:hover{color:var(--ink);border-color:var(--line-strong)}
  .hiw-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .hiw-row .logbtn{margin-bottom:0;flex:1;justify-content:center}
  .hiw-session{margin-top:-2px}
  .prline{padding:1px 2px 8px 41px;display:flex;align-items:center;gap:7px}
  .prbadge{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.06em;background:var(--max);color:#fff;padding:2px 7px;border-radius:5px}
  .prtext{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--max);text-transform:uppercase;letter-spacing:.04em}
  .rpe-row{display:flex;align-items:center;gap:9px;margin:9px 0 2px;padding:8px 10px;background:var(--paper);border:1px solid var(--line);border-radius:9px}
  .rpe-l{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);flex:1}
  .rpe-i{width:84px;height:32px}
  .linkbtn.danger:hover{color:var(--max);border-color:var(--max)}
  .rpe-u{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .setphase{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line-strong);border-radius:10px;padding:9px 12px;margin-bottom:14px;font-size:12px;color:var(--faint)}
  .setphase span{flex:1}
  .setphase-btn{appearance:none;border:1px solid var(--ink);background:var(--ink);color:#fff;font-family:var(--grotesk);font-size:12px;font-weight:600;border-radius:8px;padding:7px 11px;cursor:pointer;white-space:nowrap}
  .hist-entry.tap{cursor:pointer}
  .hist-entry.tap:hover{border-color:var(--line-strong)}
  .wrap{padding:14px 18px}
  .note{font-size:13px;color:var(--faint);margin:2px 0 18px;line-height:1.5}
  .note b{color:var(--ink);font-weight:600}

  .resume{background:var(--ink);color:#fff;border-radius:12px;padding:13px 15px;margin-bottom:16px;display:flex;align-items:center;gap:12px;cursor:pointer}
  .resume-t{font-size:14px;font-weight:600}
  .resume-s{font-family:var(--mono);font-size:11px;color:#b8b6b0;margin-top:2px}
  .resume .chev{color:#6e6f74}

  .group-lbl{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;margin:22px 0 9px;display:flex;align-items:center;gap:8px}
  .group-lbl:first-of-type{margin-top:4px}
  .group-lbl .ln{flex:1;height:1px;background:var(--line)}

  .scard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px 13px;margin-bottom:10px;display:flex;gap:13px;align-items:stretch;transition:border-color .15s,transform .1s}
  .scard.tap{cursor:pointer}
  .scard.tap:active{transform:scale(.992)}
  .scard.tap:hover{border-color:var(--line-strong)}
  .rail{width:4px;border-radius:3px;flex-shrink:0;background:var(--ink)}
  .rail.p2{opacity:.45}
  .rail.p3{background:var(--line-strong)}
  .rail.p4{background:var(--line-strong);opacity:.5}
  .scard-body{flex:1;min-width:0}
  .linkbtn{appearance:none;width:30px;height:30px;flex-shrink:0;border:1px solid var(--line-strong);background:transparent;border-radius:7px;color:var(--faint);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-right:6px}
  .linkbtn svg{width:15px;height:15px}
  .linkbtn:hover{color:var(--ink);border-color:var(--ink)}
  .scard-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .ptag{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.05em;padding:2px 6px;border-radius:5px;border:0}
  .ptag.p1{background:var(--ink);color:#fff}
  .ptag.p2{background:#E9E7E0;color:var(--ink)}
  .ptag.p3{background:transparent;color:var(--faint);border:1px solid var(--line-strong)}
  .ptag.p4{background:transparent;color:var(--faint);border:1px dashed var(--line-strong)}
  .ptag.btn{cursor:pointer}
  .scard-name{font-size:16px;font-weight:600;letter-spacing:-.01em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .scard-sub{font-family:var(--mono);font-size:11px;color:var(--faint);display:flex;gap:10px;flex-wrap:wrap}
  .scard-sub .dot{color:var(--line-strong)}
  .chev{align-self:center;color:var(--line-strong);flex-shrink:0}
  .chev svg{width:16px;height:16px;display:block}

  .ec{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .arrows{display:flex;flex-direction:column;gap:2px}
  .abtn,.del,.posbtn{appearance:none;border:1px solid var(--line-strong);background:var(--card);border-radius:6px;cursor:pointer;color:var(--faint);display:flex;align-items:center;justify-content:center}
  .abtn{width:26px;height:20px}.abtn svg{width:12px;height:12px}
  .abtn:disabled{opacity:.3;cursor:default}
  .del{width:28px;height:28px}.del svg{width:13px;height:13px}
  .del:hover{color:var(--max);border-color:var(--max)}
  .tinput{font-family:var(--grotesk);font-weight:600;font-size:15px;color:var(--ink);border:1px solid var(--line);border-radius:7px;background:var(--paper);padding:6px 8px;width:100%}
  .tinput:focus{outline:none;border-color:var(--ink);background:#fff}

  .sess-head{display:flex;align-items:center;gap:9px;margin-bottom:3px}
  .sess-name{font-size:22px;font-weight:700;letter-spacing:-.02em;flex:1}
  .sess-meta{font-family:var(--mono);font-size:11px;color:var(--faint);margin-bottom:18px}
  .legend{display:flex;gap:14px;margin-bottom:16px;padding:9px 12px;background:var(--card);border:1px solid var(--line);border-radius:9px}
  .legend span{font-size:11px;color:var(--faint);display:flex;align-items:center;gap:5px;font-weight:500}
  .lg-b{font-family:var(--mono);font-size:10px;font-weight:700;width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff}

  .block{margin-bottom:14px}
  .block.ss{position:relative;padding-left:16px}
  .ss-rail{position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--ink);border-radius:3px}
  .ss-tag{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--ink);margin:0 0 7px;display:flex;align-items:center;gap:6px}
  .ss-tag .cnt{color:var(--faint)}
  .block-edit{display:flex;align-items:center;gap:7px;margin-bottom:7px}
  .ss-tag.solo{margin:0 0 7px}
  .ex-edit-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .ex-edit-tools{display:flex;align-items:center;gap:6px;margin-left:auto}
  .lnkbtn{appearance:none;width:28px;height:28px;border:1px solid var(--line-strong);background:var(--card);border-radius:7px;color:var(--faint);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .lnkbtn svg{width:14px;height:14px}
  .lnkbtn:hover{color:var(--ink);border-color:var(--ink)}
  .lnkbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .role-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
  .rchip{appearance:none;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);border:1px solid var(--line-strong);border-radius:999px;background:var(--card);padding:5px 10px;cursor:pointer;line-height:1}
  .rchip:hover{color:var(--ink);border-color:var(--ink)}
  .rchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .grp-bar{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap}
  .grp-bar .role-chips{margin-bottom:0}
  .grp-hint{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--faint)}

  .ex{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 13px;margin-bottom:8px}
  .ex:last-child{margin-bottom:0}
  .ex-top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .ex-key{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--faint);flex-shrink:0}
  .ex-name{font-size:15px;font-weight:600;letter-spacing:-.01em;flex:1}
  .ex-name-input{margin-bottom:6px;font-weight:600}
  .ex-field{margin-bottom:6px;font-size:13px;font-weight:400}
  .ex-yt{display:inline-block;font-size:12px;font-weight:600;color:var(--max);text-decoration:none;margin-bottom:6px}
  .histbtn{appearance:none;border:1px solid var(--line);background:var(--paper);border-radius:7px;width:30px;height:28px;cursor:pointer;color:var(--faint);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .histbtn svg{width:15px;height:15px}
  .histbtn:hover{color:var(--ink);border-color:var(--line-strong)}

  .srow.head{padding:0 2px 5px}
  .srow.head .col{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--faint);text-transform:uppercase}
  .srow{display:grid;grid-template-columns:30px 1fr 46px 50px 38px;gap:6px;align-items:center;padding:5px 2px}
  .srow.secs{grid-template-columns:30px 1fr 30px}
  .srow.edit{grid-template-columns:34px 1fr 30px}
  .col-tgt{font-family:var(--mono);font-size:12px;color:var(--faint)}
  .srow.done .col-tgt{opacity:.4}
  .badge{font-family:var(--mono);font-size:11px;font-weight:700;height:30px;border-radius:7px;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff}
  .badge.sm{height:20px;width:20px;font-size:10px;cursor:default}
  .badge.R{background:var(--ramp)} .badge.W{background:var(--work)} .badge.M{background:var(--max)}
  .inp{font-family:var(--mono);font-size:14px;font-weight:500;text-align:center;height:34px;width:100%;border:1px solid var(--line);border-radius:7px;background:var(--paper);color:var(--ink);padding:0 4px}
  .inp.tgt{text-align:left}
  .inp:focus{outline:none;border-color:var(--ink);background:#fff}
  .inp::placeholder{color:var(--line-strong);font-weight:400}
  .chk{height:30px;width:30px;border:1px solid var(--line-strong);border-radius:7px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:transparent;padding:0}
  .chk svg{width:15px;height:15px}
  .srow.done .chk{background:var(--ink);border-color:var(--ink);color:#fff}
  .srow.done .inp{opacity:.55}
  .ex-add{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--faint);background:transparent;border:0;cursor:pointer;padding:6px 6px 0 2px;display:inline-flex;align-items:center;gap:5px}
  .ex-add:hover{color:var(--ink)}
  .tbtn{appearance:none;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);border:1px solid var(--line-strong);background:var(--card);border-radius:7px;height:28px;cursor:pointer;padding:0 9px;flex-shrink:0;line-height:1}
  .tbtn:hover{color:var(--ink);border-color:var(--ink)}
  .tbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .cue{font-family:var(--mono);font-size:10px;color:var(--faint);padding:1px 2px 7px 41px;line-height:1.4;letter-spacing:.01em}
  .cue.up{color:var(--ramp);font-weight:700}
  .cue.m{color:var(--max);font-weight:700}
  .lasttime{font-family:var(--mono);font-size:9px;color:var(--faint);padding:0 2px 6px 41px;line-height:1.3;letter-spacing:.02em}
  .coachcue{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ramp);background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin:2px 0 10px;line-height:1.45}
  .wload{display:flex;align-items:center;gap:9px;margin:0 0 10px;padding:8px 10px;background:var(--paper);border:1px solid var(--line);border-radius:9px}
  .wload-l{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);flex:1}
  .wload-i{width:84px;height:32px}
  .wload2{display:flex;align-items:center;gap:8px;margin:2px 0 12px}
  .wload2-l{font-family:var(--grotesk);font-size:14px;font-weight:600;color:var(--ink)}
  .wload2-i{width:92px;height:34px}
  .wload2-u{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--faint)}
  .maxbuild{padding:2px 2px 9px 41px;display:flex;flex-direction:column;gap:6px}
  .max-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .msel{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--ink);border:1px solid var(--line-strong);border-radius:7px;background:var(--card);padding:6px 8px;cursor:pointer}
  .msel:focus{outline:none;border-color:var(--ink)}
  .mfld{height:32px;width:96px}
  .inp.mfld{font-size:13px}
  .max-prev{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--max);letter-spacing:.01em}
  .max-rep{appearance:none;display:inline-flex;align-items:center;gap:6px;align-self:flex-start;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--faint);background:transparent;border:1px solid var(--line-strong);border-radius:7px;padding:5px 9px;cursor:pointer;letter-spacing:.02em}
  .max-rep svg{width:12px;height:12px}
  .max-rep:hover{color:var(--ink);border-color:var(--ink)}
  .cardio-cals{display:flex;align-items:center;gap:9px;margin-top:11px;padding-top:11px;border-top:1px solid #2b2c31}
  .cc-l{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9d9c97;flex:1}
  .cc-i{font-family:var(--mono);font-size:14px;font-weight:500;text-align:center;height:32px;width:84px;border:1px solid #3a3b40;border-radius:7px;background:#2b2c31;color:#fff;padding:0 6px}
  .cc-i:focus{outline:none;border-color:#fff}
  .cc-i::placeholder{color:#6e6f74}
  .cc-u{font-family:var(--mono);font-size:11px;color:#9d9c97}
  .chist{appearance:none;width:26px;height:26px;border:1px solid #3a3b40;background:transparent;border-radius:7px;color:#9d9c97;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .chist svg{width:14px;height:14px}
  .chist:hover{color:#fff;border-color:#fff}
  .hnote{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--max);padding:1px 0 4px 28px}
  .hwl{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--faint);text-transform:none;letter-spacing:0;margin-left:8px}
  .chrow{display:flex;align-items:center;gap:12px}
  .chcal{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--ink)}
  .chstage{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .cwhen{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--ramp);margin-left:8px}

  .cardio{background:var(--ink);color:#fff;border-radius:12px;padding:14px 15px;margin:0 0 14px}
  .cardio.bottom{margin:18px 0 0}
  .cardio-hd{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
  .cardio-ic{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.13em;color:#9d9c97}
  .fixed-pill{font-family:var(--mono);font-size:10px;font-weight:700;background:#2b2c31;color:#cfcdc7;padding:3px 7px;border-radius:5px;letter-spacing:.04em}
  .ladder{display:flex;gap:4px;margin-bottom:9px}
  .seg{flex:1;height:6px;border-radius:3px;background:#3a3b40}
  .seg.chosen{background:#fff;box-shadow:0 0 0 2px var(--ramp)}
  .cardio-stage{font-size:15px;font-weight:600;margin-bottom:1px}
  .cardio-detail{font-family:var(--mono);font-size:11px;color:#b8b6b0}
  .cardio-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:11px}
  input[type=range]{width:100%;accent-color:#fff;height:24px;margin:2px 0}
  .lead-note{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--ramp)}
  .cardio .chk{border-color:#4a4b50;flex-shrink:0}
  .cardio.done .chk{background:#fff;border-color:#fff;color:var(--ink)}
  .cardio.done .cardio-stage{opacity:.5}
  .cardio-pos{display:flex;gap:6px;margin-bottom:10px}
  .posbtn{font-family:var(--mono);font-size:10px;font-weight:700;color:#b8b6b0;background:#2b2c31;border-color:#3a3b40;padding:5px 8px;letter-spacing:.04em}
  .posbtn.on{background:#fff;color:var(--ink);border-color:#fff}

  .addbar{display:flex;gap:8px;margin-top:14px}

<body>
<div class="app" id="app"></div>

<script>
/* ============================================================
   DATA LAYER — coach calls go through /api/coach/ (cookie-gated,
   set by logging in). Client calls go through /api/client/ (no
   login — a long random token in the URL is the access key).
   ============================================================ */
const USE_REAL = true;

/* Client gating: ?client=TOKEN serves one client in locked client-mode.
   This is a long unguessable token, not the client's row ID. */
const CLIENT_TOKEN_FROM_URL = new URLSearchParams(location.search).get('client') || '';
const CLIENT_MODE = !!CLIENT_TOKEN_FROM_URL;

// Function args where the first argument is currently a clientId need that
// swapped for the token server-side expects; args where the first argument
// is a logId need the token prepended instead. Keeps every existing call
// site in this file unchanged — only gs() itself needs to know this.
const CLIENT_REPLACE_FIRST = new Set(['getTemplate','startSession','getOpenSession','getExerciseHistory','getHistory','getExerciseBests','getLastSession','getSetHistory','getCardioHistory']);
const CLIENT_PREPEND = new Set(['saveProgress','finishSession','getLog']);

class LoginRequired extends Error {}

async function gs(method){
  const args = Array.prototype.slice.call(arguments, 1);
  let path, body;
  if (CLIENT_MODE){
    path = '/api/client/' + method;
    if (CLIENT_REPLACE_FIRST.has(method)) args[0] = CLIENT_TOKEN_FROM_URL;
    else if (CLIENT_PREPEND.has(method)) args.unshift(CLIENT_TOKEN_FROM_URL);
    body = args;
  } else {
    path = '/api/coach/' + method;
    body = args;
  }
  const r = await fetch(path, {
    method: 'POST', headers: {'content-type':'application/json'},
    body: JSON.stringify({ args: body })
  });
  if (r.status === 401){
    if (!CLIENT_MODE) throw new LoginRequired();
    throw new Error('This link is no longer valid.');
  }
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

/* mock backend removed — app runs live against /api (USE_REAL). */

/* ============================================================
   STATE + CONSTANTS
   ============================================================ */
const app = document.getElementById('app');
const CYCLE = ['R','W','M'];
const KEYS = 'ABCDEFGH';
const LADDER = [
  {n:'Incline walk',      d:'Steady incline walk for the whole block — no running.'},
  {n:'Low work-to-rest',  d:'Short run bursts, long walks to recover (e.g. 30s run / 90s walk).'},
  {n:'Even work-to-rest', d:'Run and walk in equal blocks (e.g. 60s run / 60s walk).'},
  {n:'High work-to-rest', d:'Long runs, short recoveries (e.g. 90s run / 30s walk).'},
  {n:'Continuous run',    d:'Run the full block with no walking breaks.'}
];
const TEMPLATES = [
  { key:'tpl_beginner', label:'Beginner' },
  { key:'tpl_intermediate', label:'Intermediate' },
  { key:'tpl_advanced', label:'Advanced' },
  { key:'tpl_elite', label:'Elite' }
];
const PHASES=[{n:1,name:'Capacity',weeks:'Weeks 1–4'},{n:2,name:'Tension',weeks:'Weeks 5–8'},{n:3,name:'Power',weeks:'Weeks 9–12'}];
function phaseInfo(n){ return PHASES.find(p=>p.n===Number(n))||PHASES[0]; }
const GRAD_NOTE={tpl_beginner:'Beginner · graduate when you can run all 4 sessions and the Block-3 barbell lifts feel controlled',tpl_intermediate:'Intermediate · move up when the barbell lifts progress smoothly and you want more volume',tpl_advanced:'Advanced · move up when you recover well from this and want the denser hybrid work',tpl_elite:'Elite · the ceiling — run it while it keeps progressing, deload when you stall'};
const S = {
  loading:true, clients:[], clientId:null, client:null, phase:1,
  template:null, edit:false, view:'home', sessionId:null, isTemplate:false,
  log:null, runEntries:{}, exEntries:{}, cardio:{stage:1,done:false,cals:''}, open:null, last:null, bests:{}, hist:{},
  clientsOpen:false, history:{open:false}, cardioHist:{open:false}, sessHist:{open:false}, infoOpen:false, infoCtx:'week', modal:null, loginError:''
};
function uid(){ return 'x' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escA(s){ return esc(s).replace(/"/g,'&quot;'); }
function isMin(){ return !!(S.client && S.client.minimal); }

const ICON_CHEV='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';
const ICON_BACK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>';
const ICON_CHK ='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
const ICON_UP  ='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>';
const ICON_DN  ='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
const ICON_X   ='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>';
const ICON_HIST='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 4v4h4"/><path d="M12 8v4l3 2"/></svg>';
const ICON_INFO='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><path d="M12 8h.01"/></svg>';
const ICON_LOGOUT='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>';
const ICON_LINK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.07 0l1.5-1.5a5 5 0 0 0-7.07-7.07L10 5.88"/><path d="M14 11a5 5 0 0 0-7.07 0l-1.5 1.5a5 5 0 0 0 7.07 7.07L14 18.12"/></svg>';
const ICON_REPEAT='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>';
const ICON_TRASH='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>';

/* ============================================================
   RESOLVERS + SAVE
   ============================================================ */
function curSession(){ return S.template ? S.template.sessions.find(s => s.sessionId === S.sessionId) : null; }
function exAt(ei){ const s = curSession(); return s.exercises[ei]; }
function move(arr, i, dir){ const j=i+dir; if(j<0||j>=arr.length) return; const t=arr[i]; arr[i]=arr[j]; arr[j]=t; }

/* Flat exercise model: each session holds an ordered exercises[]. groupId
   (membership) and role (what the group is) are independent — a run of
   consecutive exercises sharing a groupId renders as one bracketed unit,
   and a standalone exercise can still carry a role (e.g. a lone pre-exhaust). */
// Roles are multi-select labels stored as a CSV in the exercise's `role`
// field (e.g. "superset,preexhaust"). No schema change — the column already
// holds a string; an old single value parses as a one-item list.
const ROLE_OPTS=[
  {key:'superset',label:'Superset',tag:'SUPERSET'},
  {key:'preexhaust',label:'Pre-exhaust',tag:'PRE-EXHAUST'},
  {key:'circuit',label:'Circuit',tag:'CIRCUIT'},
  {key:'complex',label:'Complex',tag:'COMPLEX'},
  {key:'sameequip',label:'Same equipment',tag:'SAME EQUIPMENT'}
];
function roleList(csv){ return String(csv||'').split(',').map(s=>s.trim()).filter(Boolean); }
function hasRole(csv,key){ return roleList(csv).indexOf(key)>=0; }
function toggleRoleCsv(csv,key){ const set=roleList(csv); const i=set.indexOf(key); if(i>=0) set.splice(i,1); else set.push(key); return set.join(','); }
// Tags in canonical ROLE_OPTS order regardless of stored order.
function roleTagsFor(csv){ const set=roleList(csv); return ROLE_OPTS.filter(o=>set.indexOf(o.key)>=0).map(o=>o.tag); }
function roleTagLine(csv){ return roleTagsFor(csv).join(' · '); }
function newGroupId(){ return 'g'+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
// Runs of consecutive exercises sharing a non-empty groupId. Standalones are
// singleton groups (groupId '' never merges).
function buildGroups(exs){
  const groups=[]; let cur=null;
  exs.forEach((e,idx)=>{
    if(e.groupId && cur && cur.groupId===e.groupId){ cur.items.push(idx); }
    else { cur={ groupId:e.groupId||'', role:e.role||'', items:[idx] }; groups.push(cur); }
  });
  return groups;
}
// Keeps grouping coherent after any reorder/edit: dissolves singleton groups,
// and if a groupId ends up split into two non-adjacent runs (e.g. a member was
// moved out), the second run gets a fresh id so they don't render as one unit.
function normalizeGroups(s){
  const ex=s.exercises; const seen={}; let i=0;
  while(i<ex.length){
    const gid=ex[i].groupId;
    if(!gid){ i++; continue; }
    let j=i; while(j+1<ex.length && ex[j+1].groupId===gid) j++;
    const runLen=j-i+1;
    if(runLen<2){ for(let k=i;k<=j;k++){ ex[k].groupId=''; ex[k].role=''; } }
    else if(seen[gid]){ const nid=newGroupId(); for(let k=i;k<=j;k++) ex[k].groupId=nid; }
    else seen[gid]=true;
    i=j+1;
  }
}

/* Double progression cue. Working sets: hold weight, add reps inside the
   range; once the top of the range is hit, the cue flips to "add weight".
   Max sets are handled separately by the max-set builder below. */
function parseRange(t){ const m=String(t==null?'':t).match(/(\d+)\s*[–-]\s*(\d+)/); return m?{lo:+m[1],hi:+m[2]}:null; }
function lastSet(exId,si){ const m=(S.last&&S.last.sets)||{}; return m[exId+':'+si]||null; }
// "Last time" reference per set slot, from S.hist (per-slot most-recent by type
// + most-recent any). Rule: same-type within 2 weeks -> type fallback (W->max,
// M->working) any date -> ultimate most-recent any. Ramps only ever pull a ramp.
function within2wk(set,now){ if(!set||!set.date) return false; const p=String(set.date).split('-'); if(p.length!==3) return false; const setMs=Date.UTC(+p[0],(+p[1])-1,+p[2]); if(isNaN(setMs)) return false; const nowMs=Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate()); return (nowMs - setMs) <= 14*864e5; }
function lastTimeRef(h,todayType,now){
  if(!h) return null;
  if(todayType==='R') return h.R||null;
  if(todayType==='W'){ if(h.W && within2wk(h.W,now)) return h.W; if(h.M) return h.M; return h.recent||null; }
  if(todayType==='M'){ if(h.M && within2wk(h.M,now)) return h.M; if(h.W) return h.W; return h.recent||null; }
  return h.recent||null;
}
function fmtDate(s){ const p=String(s||'').split('-'); if(p.length!==3||isNaN(+p[1])||isNaN(+p[2])) return String(s||''); const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][(+p[1])-1]||''; return (+p[2])+' '+m; }
function lastTimeLine(exId,si,todayType,unit){
  const ref=lastTimeRef(S.hist&&S.hist[exId+':'+si], todayType, new Date());
  if(!ref) return '';
  const loadOk=ref.load!==''&&ref.load!=null; const repsOk=ref.reps!==''&&ref.reps!=null;
  const v=(repsOk?esc(ref.reps):'–')+(unit==='secs'?'s':'');
  const main=loadOk?(esc(ref.load)+'kg × '+v):(unit==='secs'?v:(v+' reps'));
  let out=esc(fmtDate(ref.date))+' · '+(ref.type==='M'?'max · ':'')+main;
  if(ref.rpe) out+=' @RPE '+esc(ref.rpe);
  if(ref.type==='M'&&ref.maxNote){ let mm=''; try{ mm=composeMax(JSON.parse(ref.maxNote)); }catch(_){ } if(mm) out+=' · '+esc(mm); }
  return out;
}
// Working load carries forward across sessions: ghost-prefill from the most
// recent logged workingLoad for this exercise (any set), editable, no enforcement.
function lastWorkLoad(exId){
  const m=(S.last&&S.last.sets)||{};
  for(const k in m){ if(k.indexOf(exId+':')===0 && m[k].workingLoad) return m[k].workingLoad; }
  return '';
}
function workLoad(exId){ const e=S.exEntries[exId]; return (e&&e.workLoad!=null)?e.workLoad : ''; }
function setWorkLoad(exId,val){ (S.exEntries[exId]||(S.exEntries[exId]={})).workLoad=val; scheduleProgressSave(); }
// RPE is logged per set now — reps + RPE captured together on each set row
// (see the run set row + setCell). No per-exercise rating.

/* Max-set builder. Stores a small structured blob per max set; composeMax()
   turns it into the human string shown as next session's cue. */
const MAX_METHODS=[
  ['','How\'d you push it?'],['+reps','+ reps'],['rest-pause','rest-pause'],['dropset','dropset'],
  ['partials','partials'],['slow','slow eccentric'],['forced','forced reps'],['cluster','cluster'],
  ['failure','near failure / failure'],['other','other']
];
function composeMax(mx){
  if(!mx||!mx.method) return '';
  switch(mx.method){
    case '+reps': return mx.reps?('+'+mx.reps+' reps'):'+reps';
    case 'rest-pause': return mx.bursts?('rest-pause '+mx.bursts):'rest-pause';
    case 'dropset': { const a=mx.dload?(mx.dload):''; const b=mx.dreps?('×'+mx.dreps):''; const t=[a,b].filter(Boolean).join(' '); return t?('dropset '+t):'dropset'; }
    case 'partials': return 'partials'+(mx.pos?(' ('+mx.pos+')'):'');
    case 'slow': return mx.secs?(mx.secs+'s eccentric'):'slow eccentric';
    case 'forced': return mx.n?('+'+mx.n+' forced'):'forced reps';
    case 'cluster': return mx.detail?('cluster '+mx.detail):'cluster';
    case 'failure': return mx.fail==='near'?(mx.left?('~'+mx.left+' left'):'near failure'):'to failure';
    case 'other': return mx.text||'';
  }
  return '';
}
function maxOf(exId,si){ const en=S.runEntries[exId+':'+si]; return (en&&en.max)?en.max:null; }
function setMaxMethod(ei,si,method){ const e=exAt(ei); const k=e.exId+':'+si; const en=S.runEntries[k]||(S.runEntries[k]={}); en.max={method}; scheduleProgressSave(); render(); }
function setMaxField(ei,si,fld,val){ const e=exAt(ei); const k=e.exId+':'+si; const en=S.runEntries[k]||(S.runEntries[k]={}); (en.max||(en.max={method:''}))[fld]=val; scheduleProgressSave(); }
function setMaxFieldR(ei,si,fld,val){ setMaxField(ei,si,fld,val); render(); }
function repeatMax(ei,si){ const e=exAt(ei); const prev=lastSet(e.exId,si); if(!prev||!prev.maxNote) return; let blob=null; try{ blob=JSON.parse(prev.maxNote); }catch(_){ blob=null; } if(!blob) return; const k=e.exId+':'+si; const en=S.runEntries[k]||(S.runEntries[k]={}); en.max=blob; scheduleProgressSave(); render(); }
function lastMaxDisplay(exId,si){ const prev=lastSet(exId,si); if(!prev||!prev.maxNote) return ''; try{ const b=JSON.parse(prev.maxNote); return composeMax(b); }catch(_){ return ''; } }
// New PR when a working/max set beats the client's stored best for the exercise
// (heavier load, or the same top load for more reps). Needs prior history to beat.
function isPR(exId,type,reps,load){
  if(type!=='W'&&type!=='M') return false;
  const b=S.bests&&S.bests[exId]; if(!b) return false;
  const l=parseFloat(load); if(isNaN(l)) return false;
  const r=parseInt(reps,10)||0;
  return l>b.load || (l===b.load && r>b.reps);
}
function progCueMain(exId,si,st,type){
  if(type!=='W') return null;
  const prev=lastSet(exId,si);
  const range=parseRange(st.target);
  if(!range){ return (prev&&(prev.reps||prev.load))?{t:'Last: '+(prev.reps||'–')+' × '+(prev.load||'–'),c:''}:null; }
  if(!prev||(!prev.reps&&!prev.load)) return {t:'Work in '+range.lo+'–'+range.hi, c:''};
  const r=parseInt(prev.reps,10);
  if(!isNaN(r)&&r>=range.hi) return {t:'↑ Add weight — hit '+r+' @ '+(prev.load||'?'), c:'up'};
  if(!isNaN(r)) return {t:'Beat '+r+' @ '+(prev.load||'?')+' · same weight', c:''};
  return {t:'Last @ '+(prev.load||'?')+' — add a rep', c:''};
}
// Working-set "beat last time" cue. The exercise's RIR target now lives in the
// target column itself (e.g. "10–15 reps, 2 RIR"), so the cue stays purely about
// progression — what to beat from last session.
function progCue(exId,si,st,type){
  if(type==='R'||type==='M') return null;
  return progCueMain(exId,si,st,type);
}

let _pTimer=null, _tTimer=null;
function setStat(t){ const el=document.getElementById('savestat'); if(el) el.textContent=t; }
function scheduleProgressSave(){
  if(!S.log) return; setStat('saving…'); clearTimeout(_pTimer);
  _pTimer=setTimeout(()=>{ gs('saveProgress', S.log.logId, buildLogPayload()).then(()=>setStat('saved')).catch(()=>setStat('save failed')); }, 900);
}
function scheduleTemplateSave(){
  setStat('saving…'); clearTimeout(_tTimer);
  _tTimer=setTimeout(()=>{ gs('saveTemplate', S.clientId, S.phase, S.template.sessions).then(()=>setStat('saved')).catch(()=>setStat('save failed')); }, 900);
}
function flushTemplateSave(){ if(_tTimer){ clearTimeout(_tTimer); _tTimer=null; gs('saveTemplate', S.clientId, S.phase, S.template.sessions); } }
function buildLogPayload(){
  const s=curSession(); const sets=[];
  s.exercises.forEach(e=>e.sets.forEach((st,si)=>{
    const en=S.runEntries[e.exId+':'+si]||{};
    const type=en.type||st.type;
    const wl=workLoad(e.exId);
    const maxNote=(type==='M' && en.max && en.max.method)?JSON.stringify(en.max):'';
    sets.push({ exId:e.exId, exName:e.name, setOrder:si, setType:type, target:st.target, reps:en.reps||'', load:en.load||'', done:!!en.done, workingLoad:wl, maxNote, rpe:en.rpe||'' });
  }));
  return { clientId:S.clientId, phase:S.phase, sessionId:s.sessionId, sessionName:s.name, cardioStage:S.cardio.stage, cardioDone:S.cardio.done, cardioCals:S.cardio.cals||'', cardioWhen:(s.cardioPos&&s.cardioPos!=='none')?s.cardioPos:'', sets };
}

async function boot(){
  S.loading=true; render();
  try{
    if(CLIENT_MODE){
      const c = await gs('resolveClientToken', CLIENT_TOKEN_FROM_URL);
      if(!c){ S.loading=false; app.innerHTML=`<div class="loading">PROGRAM NOT FOUND<br><span style="color:var(--line-strong)">Check your link</span></div>`; return; }
      S.clients=[c]; S.clientId=c.clientId; S.client=c; S.phase=Number(c.currentPhase)||1; S.edit=false; S.isTemplate=false;
      await loadTemplate();
      S.open = await gs('getOpenSession', S.clientId);
      S.loading=false; S.view='week'; render();
      try{ if(!localStorage.getItem('twelvewp_hiw_seen')){ localStorage.setItem('twelvewp_hiw_seen','1'); openInfo('priority'); } }catch(e){}
      return;
    }
    S.clients = await gs('getClients');
    S.loading=false; S.view='home'; render();
  }catch(e){
    if (e instanceof LoginRequired){ S.loading=false; S.view='login'; render(); return; }
    setStat('load failed'); S.loading=false; render();
  }
}
async function doLogin(password){
  try{
    const r = await fetch('/api/login', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ password }) });
    if(!r.ok){ S.loginError='Wrong password'; render(); return; }
    S.loginError=''; await boot();

}

async function openSession(i){
  const s=S.template.sessions[i]; if(!s) return;
  S.sessionId=s.sessionId; S.view='session'; S.last=null; S.bests={}; S.hist={};
  if(S.isTemplate){ S.log=null; S.runEntries={}; S.exEntries={}; S.cardio={stage:1,done:false,cals:''}; render(); window.scrollTo(0,0); return; }
  try{
    const log=await gs('startSession', S.clientId, S.phase, s.sessionId, s.name); S.log=log; hydrate(log);
    try{ S.last=await gs('getLastSession', S.clientId, s.sessionId); }catch(e){ S.last=null; }
    try{ S.hist=await gs('getSetHistory', S.clientId, s.sessionId); }catch(e){ S.hist={}; }
    try{ S.bests=await gs('getExerciseBests', S.clientId); }catch(e){ S.bests={}; }
  }
  catch(e){ S.log=null; S.runEntries={}; S.exEntries={}; S.cardio={stage:1,done:false,cals:''}; S.last=null; S.bests={}; S.hist={}; }
  render(); window.scrollTo(0,0);
}
function hydrate(log){
  S.runEntries={}; S.exEntries={};
  (log.sets||[]).forEach(s=>{
    const en={type:s.setType,reps:s.reps,load:s.load,done:s.done,rpe:s.rpe};
    if(s.maxNote){ try{ en.max=JSON.parse(s.maxNote); }catch(_){ } }
    S.runEntries[s.exId+':'+s.setOrder]=en;
    const ex=S.exEntries[s.exId]||(S.exEntries[s.exId]={});
    if(s.workingLoad && ex.workLoad==null) ex.workLoad=s.workingLoad;
  });
  S.cardio={ stage:Number(log.cardioStage)||1, done:!!log.cardioDone, cals:log.cardioCals||'' };
}
async function backToWeek(){ flushTemplateSave(); S.view='week'; S.sessionId=null; if(!S.isTemplate){ try{ S.open=await gs('getOpenSession',S.clientId); }catch(e){ S.open=null; } } render(); window.scrollTo(0,0); }
async function resumeOpen(){
  if(!S.open) return;
  if(Number(S.open.phase)!==S.phase){ S.phase=Number(S.open.phase); await loadTemplate(); }
  const i=S.template.sessions.findIndex(s=>s.sessionId===S.open.sessionId);
  if(i>=0) await openSession(i);
}
async function finishCurrent(){
  if(!S.log) return; clearTimeout(_pTimer);
  setStat('saving…');
  try{ await gs('saveProgress',S.log.logId,buildLogPayload()); await gs('finishSession',S.log.logId); }catch(e){}
  S.log=null; S.runEntries={};
  await backToWeek();
}

// 'Timed' is an exercise-level attribute, not a grouping: it flips every set

async function addExercise(){

  curSession().exercises.push({exId:uid(),name,youtube:'',groupId:'',role:'',sets:[{type:'W',target:'10–12',unit:'reps'},{type:'W',target:'10–12',unit:'reps'},{type:'W',target:'10–12',unit:'reps'}]});

// Group this exercise with the one above it. If the one above is already in a
// group, join it; otherwise mint a fresh group across the pair.
function linkUp(ei){
  const s=curSession(); if(ei<=0) return;
  const e=s.exercises[ei], prev=s.exercises[ei-1];
  if(prev.groupId){ e.groupId=prev.groupId; e.role=prev.role; }
  else { const g=newGroupId(); const role=prev.role||'superset'; prev.groupId=g; prev.role=role; e.groupId=g; e.role=role; }
  scheduleTemplateSave(); render();
}
function unlinkEx(ei){ const s=curSession(); const e=s.exercises[ei]; e.groupId=''; e.role=''; normalizeGroups(s); scheduleTemplateSave(); render(); }
// Toggle one label on/off. Applies to the whole group (members sharing
// groupId) or to a standalone exercise. Multiple labels can stack.
function toggleRole(ei,key){
  const s=curSession(); const e=s.exercises[ei]; const next=toggleRoleCsv(e.role,key);
  if(e.groupId){ s.exercises.forEach(x=>{ if(x.groupId===e.groupId) x.role=next; }); }
  else { e.role=next; }

}

function weekHTML(){
  const p=S.template;

  if(!CLIENT_MODE && !S.isTemplate && Number((S.client&&S.client.currentPhase)||1)!==S.phase) h+=`<div class="setphase"><span>Viewing Block ${S.phase} · their current is Block ${Number((S.client&&S.client.currentPhase)||1)}</span><button class="setphase-btn" onclick="setClientPhase()">Set as current</button></div>`;
  if(S.open && !S.edit) h+=`<div class="resume" onclick="resumeOpen()"><div style="flex:1"><div class="resume-t">Resume in-progress session</div><div class="resume-s">${esc(S.open.sessionName)} · pick up where you left off</div></div><div class="chev">${ICON_CHEV}</div></div>`;
  if(!S.edit){
    h+=`<div class="hiw-row"><button class="logbtn" onclick="openInfo('priority')">${ICON_INFO}<span>How it works</span></button>`;
    if(!S.isTemplate) h+=`<button class="logbtn" onclick="openSessionHistory()">${ICON_HIST}<span>Training log</span></button>`;
    if(!CLIENT_MODE && !S.isTemplate) h+=`<button class="logbtn" onclick="toggleMinimal()"><span>Minimal: ${isMin()?'on':'off'}</span></button>`;
    h+=`</div>`;
  }
  if(S.edit){
    h+=`<div class="group-lbl">Reorder · rename · re-tag<span class="ln"></span></div>`;
    p.sessions.forEach((s,i)=> h+=editTile(s,i,p.sessions.length));
    h+=`<div class="addbar"><button class="addbtn" onclick="addSession()">+ add session</button></div>`;
  } else if(isMin()){
    p.sessions.forEach((s,i)=> h+=runTile(s,i));
    if(!p.sessions.length) h+=`<div class="hist-empty">No sessions yet.</div>`;
  } else {
    const flat=p.sessions.length>0 && p.sessions.every(s=>Number(s.priority)===1);
    const groups = flat
      ? [[1,'Cycle through · every session counts equally']]
      : [[1,'Priority 1 · your primary — hit it as often as you can'],[2,'Priority 2 · first backup'],[3,'Priority 3 · for lower-gas days'],[4,'Priority 4 · for lower-gas days']];
    groups.forEach(g=>{
      const list=[]; p.sessions.forEach((s,i)=>{ if(Number(s.priority)===g[0]) list.push([s,i]); });
      if(!list.length) return;
      h+=`<div class="group-lbl">${g[1]}<span class="ln"></span></div>`;
      list.forEach(pair=> h+=runTile(pair[0],pair[1]));
    });
    if(!p.sessions.length) h+=`<div class="hist-empty">No sessions yet. Tap EDIT to build the program.</div>`;
  }
  h+=`<div class="foot">${USE_REAL?'SYNCED TO SHEETS':'PREVIEW · IN-MEMORY (deploy for live sync)'}</div></div>`;
  return h;
}

function numFieldMax(ei,si,fld,ph,val){ return `<input class="inp mfld" inputmode="decimal" placeholder="${escA(ph)}" value="${escA(val==null?'':val)}" oninput="setMaxField(${ei},${si},'${fld}',this.value)">`; }

function selFieldMax(ei,si,fld,opts,val){ let o=''; opts.forEach(v=>{ o+=`<option value="${escA(v)}" ${v===val?'selected':''}>${esc(v||'choose…')}</option>`; }); return `<select class="msel mfld" onchange="setMaxFieldR(${ei},${si},'${fld}',this.value)">${o}</select>`; }
function maxBuild(ei,si,e){
  const mx=maxOf(e.exId,si)||{method:''}; const m=mx.method||'';
  let opts=''; MAX_METHODS.forEach(o=>{ opts+=`<option value="${escA(o[0])}" ${o[0]===m?'selected':''}>${esc(o[1])}</option>`; });
  let fields='';
  if(m==='+reps') fields=numFieldMax(ei,si,'reps','extra reps',mx.reps);
  else if(m==='rest-pause') fields=txtFieldMax(ei,si,'bursts','e.g. 8 +3 +2',mx.bursts);
  else if(m==='dropset') fields=numFieldMax(ei,si,'dload','drop load',mx.dload)+numFieldMax(ei,si,'dreps','drop reps',mx.dreps);
  else if(m==='partials') fields=selFieldMax(ei,si,'pos',['','long','middle','short'],mx.pos);
  else if(m==='slow') fields=numFieldMax(ei,si,'secs','seconds',mx.secs);
  else if(m==='forced') fields=numFieldMax(ei,si,'n','forced reps',mx.n);
  else if(m==='cluster') fields=txtFieldMax(ei,si,'detail','detail (optional)',mx.detail);
  else if(m==='failure') fields=selFieldMax(ei,si,'fail',['','failure','near'],mx.fail)+(mx.fail==='near'?numFieldMax(ei,si,'left','reps left',mx.left):'');
  else if(m==='other') fields=txtFieldMax(ei,si,'text','what you did',mx.text);
  const disp=composeMax(mx); const preview=disp?`<div class="max-prev">${esc(disp)}</div>`:'';
  const lastD=lastMaxDisplay(e.exId,si);
  const repeat=lastD?`<button class="max-rep" onclick="repeatMax(${ei},${si})">${ICON_REPEAT}<span>last: ${esc(lastD)}</span></button>`:'';
  return `<div class="maxbuild"><div class="max-row"><select class="msel" onchange="setMaxMethod(${ei},${si},this.value)">${opts}</select>${fields}</div>${preview}${repeat}</div>`;
}

function sessionLogDetail(log){
  let body='';

  else if(log.empty) body=`<div class="hist-empty">Couldn't load that session.</div>`;
  else {
    const order=[], byEx={};
    (log.sets||[]).forEach(s=>{ if(!byEx[s.exId]){ byEx[s.exId]={name:s.exName,sets:[]}; order.push(s.exId); } byEx[s.exId].sets.push(s); });
    order.forEach(exId=>{
      const ex=byEx[exId]; ex.sets.sort((a,b)=>a.setOrder-b.setOrder);
      let srows='';
      ex.sets.forEach(st=>{
        let note=''; if(st.type==='M'&&st.maxNote){ try{ const d=composeMax(JSON.parse(st.maxNote)); if(d) note=`<div class="hnote">${esc(d)}</div>`; }catch(_){ } }
        srows+=`<div class="hsrow"><span class="badge sm ${st.type}">${st.type}</span><span class="htgt">${esc(st.target)}</span><span class="hval">${esc(st.reps||'–')} <span class="hx">×</span> ${esc(st.load||'–')}</span></div>${note}`;
      });
      const wl=(ex.sets.find(x=>x.workingLoad)||{}).workingLoad, rpe=(ex.sets.find(x=>x.rpe)||{}).rpe;
      const tags=(wl?`<span class="hwl">working ${esc(wl)}</span>`:'')+(rpe?`<span class="hwl">RPE ${esc(rpe)}</span>`:'');
      body+=`<div class="hist-entry"><div class="hist-d">${esc(ex.name)}${tags}</div>${srows}</div>`;
    });
    if(!order.length) body=`<div class="hist-empty">No sets logged in this session.</div>`;
  }
  const ttl=(log.sessionName?esc(log.sessionName):'Session')+(log.date?(' · '+esc(log.date)):'');
  return `<div class="overlay" onclick="closeSessionHistory()"><div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-h"><button class="back" style="margin:0;font-size:13px" onclick="closeSessionLog()">${ICON_BACK} Log</button><button class="x" onclick="closeSessionHistory()">${ICON_X}</button></div>

    <div class="hist-list">${body}</div></div></div>`;
}

  }
  const field=m.kind==='input'?`<input class="mfield" id="modalfield" placeholder="${escA(m.placeholder)}" value="">`:'';
  const goCls=m.kind==='confirm'?'mbtn danger':'mbtn go';
  const goTxt=m.kind==='confirm'?m.go:'Save';
  return `<div class="overlay" onclick="modalCancel()"><div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-h">${esc(m.title)}</div>${field}
    <div class="mrow"><button class="mbtn" onclick="modalCancel()">Cancel</button><button class="${goCls}" onclick="modalSubmit()">${esc(goTxt)}</button></div></div></div>`;
}
function infoOverlay(){
  const key=(t,name,desc)=>`<div class="info-key"><span class="badge sm ${t}">${t}</span><div class="kx"><b>${name}</b> — ${desc}</div></div>`;
  const secBlocks=`
    <div class="info-sec">The three blocks<span class="ln"></span></div>
    <div class="info-item">Your 12 weeks run through three 4-week blocks, and the emphasis shifts as you go.</div>
    <div class="info-item"><span class="it-h">Weeks 1–4 · Capacity</span>Higher reps (10–15), more supersets — build your conditioning and work capacity first.</div>
    <div class="info-item"><span class="it-h">Weeks 5–8 · Tension</span>Mostly 8–12, heavier and controlled — the capacity you built lets you handle the load.</div>
    <div class="info-item"><span class="it-h">Weeks 9–12 · Power</span>Lower reps (3–8) on the big lifts moved fast, plus short conditioning circuits.</div>`;
  const secPriority=`
    <div class="info-sec">Priority<span class="ln"></span></div>
    <div class="info-item">If your sessions are <b>ranked</b> (P1, P2…): Priority 1 is your primary — hit it as often as you can. Priority 2 is your first backup, then 3 and 4 — for the days you're too run-down to repeat a 1 or 2 but still want a session. Scale down as you go.</div>
    <div class="info-item">If every session is a <b>Priority 1</b> (all equal): there's no ranking — just cycle through them. Training more that week? Cycle through again.</div>`;
  const secSets=`
    <div class="info-sec">Set types<span class="ln"></span></div>
    ${key('R','Ramp-up','light sets building up to your working weight — add as many as you need.')}
    ${key('W','Working','your main sets, run on double progression (below). Do them as prescribed.')}
    ${key('M','Max','your overload set, your call — push it however you want to top out that day. The app offers options to guide you.')}
    <div class="info-item" style="margin-top:4px">Tap a set's badge to cycle R → W → M. A set's target can be reps or seconds.</div>`;
  const secProg=`
    <div class="info-sec">Progression<span class="ln"></span></div>
    <div class="info-item">Each working set gives you a rep range and your working weight — the weight carries over, and you update it when you're ready to progress. Each session, push your output at that weight a bit higher; as your reps reach the top of the range, step the weight up.</div>`;
  const secEffort=`
    <div class="info-sec">RIR &amp; RPE<span class="ln"></span></div>
    <div class="info-item"><span class="it-h">RIR · Reps In Reserve</span>Some working sets carry an RIR target — how many reps to leave in the tank. That's the effort we're asking for.</div>
    <div class="info-item"><span class="it-h">RPE · Rate of Perceived Exertion</span>After every set you log your reps and an RPE — how hard that set actually felt, out of 10.</div>`;
  const body = isMin() ? (secSets+secProg+secEffort) : (S.infoCtx==='sets' ? (secSets+secProg+secEffort+secBlocks+secPriority) : (secBlocks+secPriority+secSets+secProg+secEffort));
  return `<div class="overlay" onclick="closeInfo()"><div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-h">How it works <button class="x" onclick="closeInfo()">${ICON_X}</button></div>
    ${body}
  </div></div>`;
}

function loginHTML(){
  return `<div class="login-wrap">
    <div class="login-card">
      <div class="login-t">Coach login</div>
      <input class="mfield" id="loginfield" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')submitLogin()">
      ${S.loginError ? `<div class="login-err">${esc(S.loginError)}</div>` : ''}
      <button class="mbtn go" style="width:100%;margin-top:10px" onclick="submitLogin()">Log in</button>
    </div>
  </div>`;
}
function submitLogin(){
  const f=document.getElementById('loginfield');
  doLogin(f ? f.value : '');
}

function render(){
  if(S.loading){ app.innerHTML=`<div class="loading"><div class="spin"></div>LOADING</div>`; return; }
  let h;
  if(S.view==='login') h=loginHTML();
  else if(S.view==='home') h=homeHTML();
  else if(S.view==='session') h=sessionHTML();
  else h=weekHTML();
  if(S.clientsOpen) h+=clientsOverlay();
  if(S.history && S.history.open) h+=historyOverlay();
  if(S.cardioHist && S.cardioHist.open) h+=cardioHistoryOverlay();
  if(S.sessHist && S.sessHist.open) h+=sessionHistoryOverlay();
  if(S.infoOpen) h+=infoOverlay();
  if(S.modal) h+=modalOverlay();
  app.innerHTML=h;
  if(S.modal && S.modal.kind==='input'){ const f=document.getElementById('modalfield'); if(f) f.focus(); }
  if(S.view==='login'){ const f=document.getElementById('loginfield'); if(f) f.focus(); }
}

boot();
</script>
</body>
</html>
